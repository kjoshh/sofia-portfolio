<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grain Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0d0b;
      --text: #e9e5dd;
      --muted: rgba(233,229,221,0.45);
      --accent: #c8a87c;
      --panel: rgba(15,13,11,0.92);
    }

    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; overflow: hidden; height: 100vh; }

    /* ── Fullscreen canvas ── */
    #canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #canvas-bg {
      position: absolute;
      inset: 0;
    }

    .layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Animated grain needs oversized element */
    .layer.animated {
      width: 200vw;
      height: 200vh;
      left: -50vw;
      top: -50vh;
    }

    /* ── Side panel ── */
    #panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 320px;
      background: var(--panel);
      backdrop-filter: blur(30px);
      border-left: 1px solid rgba(233,229,221,0.08);
      z-index: 100;
      overflow-y: auto;
      padding: 20px 16px 40px;
      font-size: 12px;
      transition: transform 0.3s ease;
    }

    #panel.collapsed { transform: translateX(100%); }

    #toggle-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 200;
      background: var(--panel);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(233,229,221,0.1);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: right 0.3s ease;
    }

    #toggle-panel.shifted { right: 336px; }

    /* ── Panel sections ── */
    .p-section {
      border: 1px solid rgba(233,229,221,0.08);
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .p-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
      background: rgba(233,229,221,0.03);
    }

    .p-header:hover { background: rgba(233,229,221,0.06); }

    .p-toggle {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: rgba(233,229,221,0.12);
      position: relative;
      flex-shrink: 0;
      transition: background 0.2s;
      cursor: pointer;
    }

    .p-toggle.on { background: var(--accent); }

    .p-toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--text);
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }

    .p-toggle.on::after { transform: translateX(16px); }

    .p-name {
      font-weight: 600;
      font-size: 12px;
      flex: 1;
    }

    .p-file {
      font-size: 10px;
      color: var(--muted);
      font-family: 'SF Mono', monospace;
    }

    .p-body {
      padding: 10px 12px 14px;
      display: none;
      border-top: 1px solid rgba(233,229,221,0.06);
    }

    .p-body.open { display: block; }

    .p-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .p-row:last-child { margin-bottom: 0; }

    .p-label {
      width: 72px;
      flex-shrink: 0;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .p-row input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      height: 4px;
    }

    .p-val {
      width: 40px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      font-size: 11px;
      flex-shrink: 0;
    }

    .p-row select {
      flex: 1;
      background: rgba(233,229,221,0.08);
      border: 1px solid rgba(233,229,221,0.1);
      border-radius: 5px;
      color: var(--text);
      padding: 4px 6px;
      font-size: 11px;
    }

    /* ── BG selector ── */
    .bg-section {
      padding: 12px;
      border-bottom: 1px solid rgba(233,229,221,0.08);
      margin-bottom: 10px;
    }

    .bg-section .p-label { margin-bottom: 6px; display: block; width: auto; }

    .bg-options {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .bg-btn {
      width: 40px;
      height: 28px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .bg-btn.active { border-color: var(--accent); }
    .bg-btn:hover { border-color: rgba(233,229,221,0.3); }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px 14px;
    }

    .title-row h2 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .btn-reset {
      background: rgba(233,229,221,0.08);
      border: 1px solid rgba(233,229,221,0.1);
      border-radius: 6px;
      color: var(--muted);
      padding: 4px 10px;
      font-size: 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .btn-reset:hover { color: var(--text); background: rgba(233,229,221,0.12); }

    /* ── Animation speed control ── */
    .anim-badge {
      display: inline-block;
      background: rgba(200,168,124,0.15);
      color: var(--accent);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: auto;
    }

    svg { position: absolute; width: 0; height: 0; }
  </style>
</head>
<body>

  <!-- SVG noise filter -->
  <svg><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter></svg>

  <!-- Fullscreen canvas -->
  <div id="canvas">
    <div id="canvas-bg"></div>
    <!-- Layers injected by JS -->
  </div>

  <!-- Toggle button -->
  <button id="toggle-panel" class="shifted">Panel</button>

  <!-- Control panel -->
  <div id="panel">
    <div class="title-row">
      <h2>Grain Lab</h2>
      <button class="btn-reset" id="btn-reset">Reset All</button>
    </div>

    <!-- Background picker -->
    <div class="bg-section">
      <div class="p-label">Background</div>
      <div class="bg-options" id="bg-options"></div>
    </div>

    <!-- Layer controls injected by JS -->
    <div id="layers-container"></div>
  </div>

  <script>
    // ── Layer definitions ──
    const LAYERS = [
      {
        id: 'dusti',
        name: '.dusti — Dust',
        file: 'images/BGDust.png',
        defaults: { on: true, opacity: 0.10, blend: 'normal', size: 'cover', animated: false },
      },
      {
        id: 'nois3',
        name: '.nois3 — Static Noise',
        file: 'images/Noise.png',
        defaults: { on: true, opacity: 0.10, blend: 'normal', size: 'cover', animated: false },
      },
      {
        id: 'nois3-grain',
        name: '.nois3-grain — Animated',
        file: 'images/Noise.png',
        defaults: { on: true, opacity: 0.08, blend: 'normal', size: 'cover', animated: true, speed: 2 },
        isAnimated: true,
      },
      {
        id: 'grain-tiled',
        name: 'Grain Tiled (nav style)',
        file: 'brand_assets/grain.jpg',
        defaults: { on: false, opacity: 0.06, blend: 'overlay', size: '200', animated: false },
        isTiled: true,
      },
      {
        id: 'dust-screen',
        name: 'Dust Screen (nav style)',
        file: 'brand_assets/BGDust.png',
        defaults: { on: false, opacity: 0.14, blend: 'screen', size: 'cover', animated: false },
      },
      {
        id: 'gif-noise',
        name: 'GIF Noise',
        file: 'images/noiseeee.gif',
        defaults: { on: false, opacity: 0.08, blend: 'normal', size: 'cover', animated: false },
      },
      {
        id: 'svg-noise',
        name: 'SVG feTurbulence',
        file: 'none (generated)',
        defaults: { on: false, opacity: 0.15, blend: 'overlay', size: 'cover', animated: false },
        isSvg: true,
      },
      {
        id: 'css-grain',
        name: 'CSS-Only Grain',
        file: 'none (data URI)',
        defaults: { on: false, opacity: 0.12, blend: 'overlay', size: '128', animated: false },
        isTiled: true,
        dataUri: "data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E",
      },
    ];

    const BACKGROUNDS = [
      { id: 'dark',     label: '#0f0d0b',  css: '#0f0d0b',  swatch: '#0f0d0b' },
      { id: 'mid',      label: '#1a1816',  css: '#1a1816',  swatch: '#1a1816' },
      { id: 'warm',     label: '#2a2520',  css: '#2a2520',  swatch: '#2a2520' },
      { id: 'gradient', label: 'Gradient', css: 'linear-gradient(135deg, #1a1816, #2a2520, #1a1816)', swatch: 'linear-gradient(135deg, #1a1816, #2a2520)' },
      { id: 'light',    label: '#e9e5dd',  css: '#e9e5dd',  swatch: '#e9e5dd' },
      { id: 'white',    label: '#fff',     css: '#ffffff',  swatch: '#ffffff' },
      { id: 'photo',    label: 'Photo',    css: "url('https://placehold.co/1920x1080/1a1816/e9e5dd?text=.') center/cover", swatch: 'linear-gradient(135deg, #555, #333)' },
    ];

    const BLENDS = ['normal','overlay','screen','multiply','soft-light','hard-light','luminosity','color-dodge','color-burn','difference','exclusion'];

    const canvas = document.getElementById('canvas');
    const canvasBg = document.getElementById('canvas-bg');
    const container = document.getElementById('layers-container');

    // State
    const state = {};

    // ── Build background picker ──
    const bgOpts = document.getElementById('bg-options');
    BACKGROUNDS.forEach((b, i) => {
      const btn = document.createElement('div');
      btn.className = 'bg-btn' + (i === 0 ? ' active' : '');
      btn.style.background = b.swatch;
      btn.title = b.label;
      btn.dataset.id = b.id;
      btn.addEventListener('click', () => {
        bgOpts.querySelectorAll('.bg-btn').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        canvasBg.style.background = b.css;
      });
      bgOpts.appendChild(btn);
    });
    canvasBg.style.background = BACKGROUNDS[0].css;

    // ── Build layer controls ──
    LAYERS.forEach(layer => {
      const d = { ...layer.defaults };
      state[layer.id] = d;

      // Create overlay element
      const el = document.createElement('div');
      el.className = 'layer' + (layer.isAnimated ? ' animated' : '');
      el.id = 'layer-' + layer.id;
      canvas.appendChild(el);

      // Section
      const section = document.createElement('div');
      section.className = 'p-section';

      // Header
      const header = document.createElement('div');
      header.className = 'p-header';
      header.innerHTML = `
        <div class="p-toggle ${d.on ? 'on' : ''}" data-layer="${layer.id}"></div>
        <div>
          <div class="p-name">${layer.name}</div>
          <div class="p-file">${layer.file}</div>
        </div>
        ${layer.isAnimated ? '<span class="anim-badge">Animated</span>' : ''}
      `;

      // Toggle
      const toggle = header.querySelector('.p-toggle');
      toggle.addEventListener('click', e => {
        e.stopPropagation();
        d.on = !d.on;
        toggle.classList.toggle('on', d.on);
        applyLayer(layer);
      });

      // Expand/collapse
      const body = document.createElement('div');
      body.className = 'p-body' + (d.on ? ' open' : '');
      header.addEventListener('click', () => body.classList.toggle('open'));

      // ── Controls ──

      // Opacity
      body.appendChild(makeRange('Opacity', d.opacity, 0, 0.6, 0.005, v => {
        d.opacity = v;
        applyLayer(layer);
      }));

      // Blend mode
      body.appendChild(makeSelect('Blend', BLENDS, d.blend, v => {
        d.blend = v;
        applyLayer(layer);
      }));

      // Size (for tiled textures)
      if (layer.isTiled) {
        body.appendChild(makeRange('Tile Size', parseInt(d.size), 32, 600, 8, v => {
          d.size = String(v);
          applyLayer(layer);
        }, 'px'));
      }

      // Animation speed
      if (layer.isAnimated) {
        body.appendChild(makeRange('Speed', d.speed, 0.2, 8, 0.1, v => {
          d.speed = v;
          applyLayer(layer);
        }, 's'));

        body.appendChild(makeSelect('Steps', ['2','4','6','8','12','none'], '6', v => {
          d.steps = v;
          applyLayer(layer);
        }));
      }

      section.appendChild(header);
      section.appendChild(body);
      container.appendChild(section);

      applyLayer(layer);
    });

    // ── Apply layer styling ──
    function applyLayer(layer) {
      const d = state[layer.id];
      const el = document.getElementById('layer-' + layer.id);

      if (!d.on) {
        el.style.display = 'none';
        return;
      }
      el.style.display = '';

      // Reset
      el.style.filter = '';
      el.style.background = '';
      el.style.backgroundImage = '';
      el.style.backgroundSize = '';
      el.style.animation = '';
      el.style.width = '';
      el.style.height = '';
      el.style.left = '';
      el.style.top = '';
      el.className = 'layer';

      if (layer.isSvg) {
        el.style.filter = 'url(#noiseFilter)';
        el.style.background = `rgba(128,128,128,${d.opacity})`;
        el.style.mixBlendMode = d.blend;
        el.style.opacity = '1';
        return;
      }

      const img = layer.dataUri || layer.file;
      el.style.backgroundImage = `url('${img}')`;

      if (layer.isTiled) {
        const px = d.size + 'px';
        el.style.backgroundSize = `${px} ${px}`;
      } else {
        el.style.backgroundSize = 'cover';
      }

      if (layer.isAnimated) {
        el.className = 'layer animated';
        const steps = d.steps || '6';
        const stepsVal = steps === 'none' ? '' : `steps(${steps})`;
        el.style.animation = `grain ${d.speed}s ${stepsVal} infinite`;
      }

      el.style.opacity = d.opacity;
      el.style.mixBlendMode = d.blend;
    }

    // ── Helpers ──
    function makeRange(label, value, min, max, step, onChange, unit = '') {
      const row = document.createElement('div');
      row.className = 'p-row';
      const valSpan = document.createElement('span');
      valSpan.className = 'p-val';
      const fmt = v => unit ? Math.round(v) + unit : parseFloat(v).toFixed(3);
      valSpan.textContent = fmt(value);

      const input = document.createElement('input');
      input.type = 'range';
      input.min = min;
      input.max = max;
      input.step = step;
      input.value = value;
      input.addEventListener('input', () => {
        const v = parseFloat(input.value);
        valSpan.textContent = fmt(v);
        onChange(v);
      });

      row.innerHTML = `<span class="p-label">${label}</span>`;
      row.appendChild(input);
      row.appendChild(valSpan);
      return row;
    }

    function makeSelect(label, options, current, onChange) {
      const row = document.createElement('div');
      row.className = 'p-row';
      const sel = document.createElement('select');
      options.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o;
        opt.textContent = o;
        if (o === current) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => onChange(sel.value));
      row.innerHTML = `<span class="p-label">${label}</span>`;
      row.appendChild(sel);
      return row;
    }

    // ── Reset ──
    document.getElementById('btn-reset').addEventListener('click', () => {
      LAYERS.forEach(layer => {
        const d = { ...layer.defaults };
        state[layer.id] = d;
        applyLayer(layer);
      });
      // Re-render panel
      container.innerHTML = '';
      location.reload();
    });

    // ── Toggle panel ──
    const panel = document.getElementById('panel');
    const toggleBtn = document.getElementById('toggle-panel');
    toggleBtn.addEventListener('click', () => {
      panel.classList.toggle('collapsed');
      toggleBtn.classList.toggle('shifted');
      toggleBtn.textContent = panel.classList.contains('collapsed') ? 'Panel' : 'Panel';
    });

    // ── Grain keyframes (injected so animated layer works) ──
    const style = document.createElement('style');
    style.textContent = `
      @keyframes grain {
        0%, 100% { transform: translate(0, 0); }
        10% { transform: translate(-5%, -10%); }
        20% { transform: translate(-15%, 5%); }
        30% { transform: translate(7%, -25%); }
        40% { transform: translate(-5%, 25%); }
        50% { transform: translate(-15%, 10%); }
        60% { transform: translate(15%, 0%); }
        70% { transform: translate(0%, 15%); }
        80% { transform: translate(3%, 35%); }
        90% { transform: translate(-10%, 10%); }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
