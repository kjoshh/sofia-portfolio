<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WebGL Nav Hover — Snippet</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #292823;
      overflow: hidden;
      font-family: Alegreya, sans-serif;
    }

    /* ── Background ── */
    .imgbg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
    .sofianamebg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ── Noise / dust overlays ── */
    .dusti {
      width: 100vw; height: 100vh;
      position: fixed;
      pointer-events: none;
      opacity: 0.1;
      z-index: 100;
      background-image: url("../images/BGDust.png");
    }
    .nois3 {
      width: 100vw; height: 100vh;
      position: fixed;
      pointer-events: none;
      opacity: 0.1;
      z-index: 100;
      background-image: url("../images/Noise.png");
    }
    .nois3-grain {
      position: fixed; inset: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.08;
      z-index: 100;
    }
    .nois3-grain::after {
      content: "";
      position: absolute;
      width: 200vw; height: 200vh;
      left: -50%; top: -50%;
      background-image: url("../images/Noise.png");
      animation: grain 2s steps(6) infinite;
    }
    @keyframes grain {
      0%,100% { transform: translate(0,0); }
      10%  { transform: translate(-5%,-10%); }
      30%  { transform: translate(3%,-15%); }
      50%  { transform: translate(12%,9%); }
      70%  { transform: translate(9%,4%); }
      90%  { transform: translate(-1%,7%); }
    }

    /* ── Custom cursor ── */
    .cursor {
      position: fixed;
      width: 17.5px; height: 17.5px;
      border-radius: 50%;
      background: #e9e5dd;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 250ms ease, width 0.2s ease, height 0.2s ease;
      z-index: 2147483647;
      mix-blend-mode: difference;
    }
    .cursor.hover { width: 55px; height: 55px; }

    /* ── Nav ── */
    @font-face {
      font-family: Post;
      src: url('../fonts/Post.otf') format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    .main-nav {
      font-family: Alegreya, sans-serif;
      font-size: 14.5px;
      z-index: 999990;
      pointer-events: auto;
      padding: 12px 32px;
      display: flex;
      position: fixed;
      width: max-content;
      max-width: 92vw;
      top: 1.4em;
      left: 50%;
      transform: translate(-50%);
    }
    .nav-bg {
      position: absolute; inset: 0;
      z-index: -1;
      background-color: #29282385;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 40px;
      box-shadow: 0 0 10px 2px #29282385;
      pointer-events: none;
    }
    .wrapin {
      display: flex;
      align-items: center;
    }
    .main-nav .wrapin {
      flex-direction: column;
      align-items: stretch;
    }
    .nav-menu {
      grid-column-gap: 1.25em;
      align-items: baseline;
      display: flex;
      gap: 2em;
      justify-content: space-between;
      z-index: 1;
    }
    .nav-link {
      opacity: 1;
      color: hsla(50, 23%, 95%, 0.9);
      letter-spacing: .125em;
      padding: 0;
      font-size: 1em;
      text-decoration: none;
      transition: opacity .25s;
    }
    .nav-link:hover, .nav-link.active { cursor: pointer; }
    .nav-link.active   { color: hsla(50, 23%, 95%, 1); }
    .nav-link.notactive { color: hsla(50, 23%, 95%, 0.9); }
    .logo-link { margin-right: 2em; font-weight: 500; color: hsla(50, 23%, 95%, 1) !important; }

    /* Nav dropdown */
    .nav-dropdown-wrap { display: flex; flex-direction: column; align-items: center; }
    .nav-dropdown {
      max-height: 0; overflow: hidden;
      display: flex; flex-direction: column;
      align-items: flex-start;
      white-space: nowrap;
      gap: 0.15em;
    }
    .nav-dropdown-item { padding-top: 0.6em; opacity: 0; letter-spacing: 0.1em; font-size: 0.93em; }

    /* Logo char-swap wrappers */
    .char-wrapper {
      display: inline-block;
      position: relative;
      overflow: hidden;
      vertical-align: bottom;
    }
    .char-top, .char-bottom {
      display: inline-block;
      line-height: 1.15;
    }
    .char-bottom.post-font {
      font-family: Post, serif;
      letter-spacing: 0.03em;
      font-size: 1.19em;
      opacity: 1 !important;
      position: absolute;
      top: calc(100% - 0.25em);
      left: 0;
      width: 100%;
      text-align: center;
    }

    /* Index nav position */
    .index-nav {
      top: calc(27.5% - 22px) !important;
      font-size: 14.5px;
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="dusti"></div>
  <div class="nois3"></div>
  <div class="nois3-grain"></div>

  <!-- Nav pill -->
  <div class="main-nav index-nav">
    <div class="nav-bg"></div>
    <div class="wrapin">
      <nav class="nav-menu">
        <a href="#" class="nav-link logo-link">Sofia Cartuccia</a>
        <div class="nav-dropdown-wrap">
          <a href="#" data-bg="projects" class="nav-link">Projects</a>
        </div>
        <a href="#" data-bg="archive" class="nav-link">Archive</a>
        <a href="#" data-bg="about" class="nav-link">About</a>
      </nav>
      <div class="nav-dropdown" id="projects-dropdown">
        <a href="#" class="nav-link nav-dropdown-item">Forgetting Dreams</a>
        <a href="#" class="nav-link nav-dropdown-item">Hard-Coded</a>
      </div>
    </div>
  </div>

  <!-- Background container — Three.js canvas will be injected here -->
  <div class="imgbg">
    <img class="sofianamebg" src="../images/0017_17A.jpg" alt="">
  </div>

  <!-- Three.js + GSAP -->
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script>
    /* ════════════════════════════════════════════════════════════
       CURSOR
    ════════════════════════════════════════════════════════════ */
    (function () {
      const cursor = document.getElementById('cursor');
      let mx = 0, my = 0, cx = 0, cy = 0;
      window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
      (function loop() {
        cx += (mx - cx) * 0.12;
        cy += (my - cy) * 0.12;
        cursor.style.left = cx + 'px';
        cursor.style.top  = cy + 'px';
        requestAnimationFrame(loop);
      })();
      document.querySelectorAll('a, button, [data-bg]').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
      });
    })();


    /* ════════════════════════════════════════════════════════════
       NAV — cursor follow + magnetic pull
    ════════════════════════════════════════════════════════════ */
    const nav = document.querySelector('.main-nav');
    gsap.set(nav, { xPercent: -50, yPercent: 0 });
    const navMoveX = gsap.quickTo(nav, 'x', { duration: 0.9, ease: 'power3.out' });
    const navMoveY = gsap.quickTo(nav, 'y', { duration: 0.9, ease: 'power3.out' });
    const PARALLAX_STRENGTH = 12.5;
    window.addEventListener('mousemove', e => {
      const cx = innerWidth / 2, cy = innerHeight / 2;
      navMoveX((e.clientX - cx) / cx * PARALLAX_STRENGTH);
      navMoveY((e.clientY - cy) / cy * PARALLAX_STRENGTH);
    });


    /* ════════════════════════════════════════════════════════════
       WEBGL FLUID BACKGROUND TRANSITION
    ════════════════════════════════════════════════════════════ */

    // Map nav links → background images (relative to this snippets/ folder)
    const NAV_BG = {
      'index':    '../images/0017_17A.jpg',
      'projects': '../images/Forgettingdreams-1.jpg',
      'archive':  '../images/sofia_archive-31.jpg',
      'about':    '../images/Sybilbg.jpg',
    };

    const defaultBg  = document.querySelector('.imgbg');
    const defaultImg = defaultBg ? defaultBg.querySelector('img') : null;

    const noiseLayers = [
      { el: document.querySelector('.dusti'),      peak: 0.7, rest: 0.1 },
      { el: document.querySelector('.nois3'),      peak: 0.5, rest: 0.1 },
      { el: document.querySelector('.nois3-grain'),peak: 0.6, rest: 0.08 },
    ].filter(l => l.el);

    // ── Configuration ──────────────────────────────────────────
    const FLUID_CONFIG = {
      duration:      5,
      ease:          'power2.out',
      noiseSpeed:    0.15,
      noiseScale:    2.5,
      noiseAmount:   0.35,
      edgeSoftness:  0.015,
      viscosity:     0.75,
      refraction:    0.25,
      lipBrightness: 0.1
    };

    // ── Shaders ────────────────────────────────────────────────
    const vertexShader = `
      varying vec2 v_uv;
      void main() { v_uv = uv; gl_Position = vec4(position, 1.0); }
    `;
    const fragmentShader = `
      precision highp float;
      uniform sampler2D u_tex0;
      uniform sampler2D u_tex1;
      uniform float u_progress;
      uniform float u_time;
      uniform vec2  u_resolution;
      uniform vec2  u_aspect0;
      uniform vec2  u_aspect1;
      uniform float u_noiseSpeed;
      uniform float u_noiseScale;
      uniform float u_noiseAmount;
      uniform float u_edgeSoftness;
      uniform vec2  u_mouse;
      uniform float u_viscosity;
      uniform float u_refraction;
      uniform float u_lipBrightness;
      varying vec2 v_uv;

      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
      float noise(vec2 p) {
        vec2 i = floor(p); vec2 f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(hash(i+vec2(0,0)),hash(i+vec2(1,0)),u.x),
                   mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
      }
      float turbulence(vec2 p) {
        float t = 0.0; float w = 0.5;
        for (int i = 0; i < 5; i++) { t += abs(noise(p)) * w; p *= 2.0; w *= 0.5; }
        return t;
      }
      vec2 getCoverUV(vec2 uv, vec2 res, vec2 aspect) {
        float screenR = res.x / res.y;
        float imgR = aspect.x / aspect.y;
        vec2 newUv = uv;
        if (imgR > screenR) { newUv.x = 0.5 + (uv.x - 0.5) * (screenR / imgR); }
        else { newUv.y = 0.5 + (uv.y - 0.5) * (imgR / screenR); }
        return newUv;
      }

      void main() {
        vec2 uv = v_uv;
        vec4 c0 = texture2D(u_tex0, getCoverUV(uv, u_resolution, u_aspect0));
        vec2 uv1 = getCoverUV(uv, u_resolution, u_aspect1);
        vec4 c1 = texture2D(u_tex1, uv1);

        float n1 = turbulence(uv * u_noiseScale + u_time * u_noiseSpeed);
        float n2 = turbulence(uv * (u_noiseScale * 2.0) - u_time * (u_noiseSpeed * 1.3));
        float noiseComb = (n1 * 0.6 + n2 * 0.4);

        vec2 correctedUV = uv;
        vec2 correctedMouse = u_mouse;
        float screenR = u_resolution.x / u_resolution.y;
        correctedUV.x *= screenR;
        correctedMouse.x *= screenR;

        float dist = distance(correctedUV, correctedMouse);
        float fingerNoise = turbulence(correctedUV * 1.5 + u_time * 0.1);
        float progressMult = 1.0 + (fingerNoise - 0.5) * u_viscosity;
        float spread = dist + (noiseComb - 0.5) * u_noiseAmount;

        float d1 = distance(correctedMouse, vec2(0.0, 0.0));
        float d2 = distance(correctedMouse, vec2(screenR, 0.0));
        float d3 = distance(correctedMouse, vec2(0.0, 1.0));
        float d4 = distance(correctedMouse, vec2(screenR, 1.0));
        float maxDist = max(max(d1, d2), max(d3, d4));
        float minMult = 1.0 - (0.5 * u_viscosity);
        float pEnd = (maxDist + (u_noiseAmount * 0.5) + u_edgeSoftness) / minMult;
        float pStart = -(u_noiseAmount * 0.5 + u_edgeSoftness + 0.01) / minMult;

        float baseP = mix(pStart, pEnd, u_progress);
        float p = baseP * progressMult;
        float mask = smoothstep(p - u_edgeSoftness, p + u_edgeSoftness, spread);

        float edgeThickness = 0.08;
        float edgeRing = (1.0 - mask) * smoothstep(p - edgeThickness, p, spread);
        vec2 refractOff = vec2((noiseComb - 0.5) * u_refraction * edgeRing);
        c1 = texture2D(u_tex1, getCoverUV(uv + refractOff, u_resolution, u_aspect1));

        float lip = smoothstep(p + 0.01, p, spread) * smoothstep(p - 0.05, p - 0.02, spread);
        c1.rgb += lip * u_lipBrightness;

        gl_FragColor = mix(c1, c0, mask);
      }
    `;

    // ── Three.js setup ─────────────────────────────────────────
    let scene, camera, renderer, uniforms;
    const textures = {};
    const textureAspects = {};
    const loader = new THREE.TextureLoader();
    let bgCurrentSrc = NAV_BG['index'];
    let bgNextSrc    = bgCurrentSrc;

    function updateUniformAspects(src, t) {
      if (uniforms && textureAspects[src]) {
        const { w, h } = textureAspects[src];
        if (t === 0) uniforms.u_aspect0.value.set(w, h);
        if (t === 1) uniforms.u_aspect1.value.set(w, h);
      }
    }

    Object.entries(NAV_BG).forEach(([, src]) => {
      textures[src] = loader.load(src, tex => {
        tex.minFilter = THREE.LinearMipMapLinearFilter;
        tex.magFilter = THREE.LinearFilter;
        textureAspects[src] = { w: tex.image.width, h: tex.image.height };
        if (uniforms) {
          if (bgCurrentSrc === src) { uniforms.u_tex0.value = tex; updateUniformAspects(src, 0); }
          if (bgNextSrc    === src) { uniforms.u_tex1.value = tex; updateUniformAspects(src, 1); }
          if (bgCurrentSrc === src && !isAnimating) renderer.render(scene, camera);
        }
      });
    });

    scene    = new THREE.Scene();
    camera   = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    uniforms = {
      u_tex0:         { value: textures[bgCurrentSrc] },
      u_tex1:         { value: textures[bgCurrentSrc] },
      u_progress:     { value: 0 },
      u_time:         { value: 0 },
      u_resolution:   { value: new THREE.Vector2(innerWidth, innerHeight) },
      u_aspect0:      { value: new THREE.Vector2(1, 1) },
      u_aspect1:      { value: new THREE.Vector2(1, 1) },
      u_noiseSpeed:   { value: FLUID_CONFIG.noiseSpeed },
      u_noiseScale:   { value: FLUID_CONFIG.noiseScale },
      u_noiseAmount:  { value: FLUID_CONFIG.noiseAmount },
      u_edgeSoftness: { value: FLUID_CONFIG.edgeSoftness },
      u_mouse:        { value: new THREE.Vector2(0.5, 0.5) },
      u_viscosity:    { value: FLUID_CONFIG.viscosity },
      u_refraction:   { value: FLUID_CONFIG.refraction },
      u_lipBrightness:{ value: FLUID_CONFIG.lipBrightness },
    };

    scene.add(new THREE.Mesh(
      new THREE.PlaneGeometry(2, 2),
      new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader })
    ));

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    renderer.domElement.style.cssText = 'position:absolute;inset:0;z-index:0;';
    if (defaultBg) {
      defaultBg.appendChild(renderer.domElement);
      if (defaultImg) defaultImg.style.display = 'none';
    }

    let isAnimating = false, animId = null;
    function renderLoop() {
      uniforms.u_time.value += 0.01;
      renderer.render(scene, camera);
      if (isAnimating) animId = requestAnimationFrame(renderLoop);
    }
    renderer.render(scene, camera);

    window.addEventListener('resize', () => {
      renderer.setSize(innerWidth, innerHeight);
      uniforms.u_resolution.value.set(innerWidth, innerHeight);
    });

    function slideBg(src) {
      if (src === bgCurrentSrc) return;
      bgNextSrc = src;
      uniforms.u_tex0.value = textures[bgCurrentSrc]; updateUniformAspects(bgCurrentSrc, 0);
      uniforms.u_tex1.value = textures[src];           updateUniformAspects(src, 1);
      bgCurrentSrc = src;
      gsap.killTweensOf(uniforms.u_progress);
      uniforms.u_progress.value = 0;
      if (!isAnimating) { isAnimating = true; renderLoop(); }
      gsap.to(uniforms.u_progress, {
        value: 1,
        duration: FLUID_CONFIG.duration,
        ease: FLUID_CONFIG.ease,
        onComplete: () => {
          isAnimating = false;
          if (animId) { cancelAnimationFrame(animId); animId = null; }
        }
      });
    }


    /* ════════════════════════════════════════════════════════════
       NAV HOVER → trigger WebGL transition
    ════════════════════════════════════════════════════════════ */
    const navHoverEls = [...document.querySelectorAll('.main-nav .nav-link:not(.nav-dropdown-item)')].filter(Boolean);

    function setNavActive(activeEl) {
      navHoverEls.forEach(el => {
        if (el === activeEl) { el.classList.add('active'); el.classList.remove('notactive'); }
        else {
          const wasActive = el.classList.contains('active');
          el.classList.remove('active'); el.classList.add('notactive');
          if (wasActive && el._staggerOff) el._staggerOff();
        }
      });
    }

    navHoverEls.forEach(el => {
      const bg = el.dataset.bg || 'index';
      const src = NAV_BG[bg];
      if (!src) return;
      el.addEventListener('mouseenter', e => {
        uniforms.u_mouse.value.x = e.clientX / innerWidth;
        uniforms.u_mouse.value.y = 1.0 - (e.clientY / innerHeight);
        slideBg(src);
        setNavActive(el);
      });
    });


    /* ════════════════════════════════════════════════════════════
       LOGO TEXT SWAP — "Sofia Cartuccia" ↔ "Sybil Sometimes"
    ════════════════════════════════════════════════════════════ */
    const logoEl = document.querySelector('.logo-link');
    if (logoEl) {
      const LOGO_DEFAULT = 'Sofia Cartuccia';
      const LOGO_SYBIL   = 'Sybil Sometimes';

      // Build char-wrapper spans
      const chars = [...LOGO_DEFAULT].map(ch => ch === ' ' ? '\u00A0' : ch);
      const sybilChars = [...LOGO_SYBIL].map(ch => ch === ' ' ? '\u00A0' : ch);
      logoEl.innerHTML = chars.map((ch, i) => `
        <span class="char-wrapper">
          <span class="char-top">${ch}</span>
          <span class="char-bottom post-font">${sybilChars[i] ?? ''}</span>
        </span>`).join('');

      function swapLogoChars(newText) {
        const wrappers = logoEl.querySelectorAll('.char-wrapper');
        const isHover = newText === LOGO_SYBIL;
        wrappers.forEach((wrapper, i) => {
          const topSpan    = wrapper.querySelector('.char-top');
          const bottomSpan = wrapper.querySelector('.char-bottom');
          if (isHover) bottomSpan.textContent = sybilChars[i] ?? '';
          gsap.killTweensOf([topSpan, bottomSpan]);
          gsap.to([topSpan, bottomSpan], { yPercent: isHover ? -100 : 0, duration: 0.4, delay: i * 0.03, ease: 'power3.inOut' });
        });
      }

      logoEl.classList.add('notactive');
      logoEl._staggerOff = () => swapLogoChars(LOGO_DEFAULT);
      logoEl.addEventListener('mouseenter', () => swapLogoChars(LOGO_SYBIL));
    }


    /* ════════════════════════════════════════════════════════════
       NAV DROPDOWN
    ════════════════════════════════════════════════════════════ */
    const dropdownWrap = document.querySelector('.nav-dropdown-wrap');
    const dropdown     = document.getElementById('projects-dropdown');
    const dropdownItems = dropdown ? [...dropdown.querySelectorAll('.nav-dropdown-item')] : [];

    if (dropdownWrap && dropdown) {
      function alignDropdown() {
        const pr = dropdownWrap.getBoundingClientRect();
        const wr = dropdownWrap.closest('.wrapin').getBoundingClientRect();
        dropdown.style.paddingLeft = (pr.left - wr.left) + 'px';
      }
      alignDropdown();
      window.addEventListener('resize', alignDropdown);

      const fullHeight = () => {
        dropdown.style.maxHeight = 'none';
        const h = dropdown.scrollHeight;
        dropdown.style.maxHeight = '0';
        return h;
      };

      dropdownWrap.addEventListener('mouseenter', () => {
        gsap.to(dropdown,      { maxHeight: fullHeight(), duration: 0.25, ease: 'power2.out' });
        gsap.to(dropdownItems, { opacity: 1, duration: 0.2, stagger: 0.06, delay: 0.05, ease: 'power2.out' });
      });
      const closeDropdown = () => {
        gsap.to(dropdown,      { maxHeight: 0, duration: 0.2, ease: 'power2.in' });
        gsap.to(dropdownItems, { opacity: 0, duration: 0.15, ease: 'power2.in' });
      };
      document.querySelector('.main-nav').addEventListener('mouseleave', closeDropdown);
      document.querySelectorAll('.main-nav .nav-link:not(.nav-dropdown-item)').forEach(link => {
        if (!link.closest('.nav-dropdown-wrap')) link.addEventListener('mouseenter', closeDropdown);
      });
    }


    /* ════════════════════════════════════════════════════════════
       NAV PILL — organic border-radius wobble
    ════════════════════════════════════════════════════════════ */
    (function () {
      const navBg = document.querySelector('.index-nav .nav-bg');
      if (!navBg) return;
      let t = 0;
      function fract(x) { return x - Math.floor(x); }
      function hash(px, py) { return fract(Math.sin(px * 127.1 + py * 311.7) * 43758.5453); }
      function noise(px, py) {
        const ix = Math.floor(px), iy = Math.floor(py);
        const fx = px - ix, fy = py - iy;
        const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
        return hash(ix, iy) + (hash(ix+1, iy) - hash(ix, iy)) * ux
             + (hash(ix, iy+1) - hash(ix, iy)) * uy
             + (hash(ix, iy) - hash(ix+1, iy) - hash(ix, iy+1) + hash(ix+1, iy+1)) * ux * uy;
      }
      (function loop() {
        t += 0.015;
        const s = t * 1.5;
        const r = i => Math.round(40 + (noise(s + i * 5.1, i * 4.2) - 0.5) * 16);
        navBg.style.borderRadius = `${r(0)}px ${r(1)}px ${r(2)}px ${r(3)}px / ${r(4)}px ${r(5)}px ${r(6)}px ${r(7)}px`;
        requestAnimationFrame(loop);
      })();
    })();
  </script>
</body>
</html>
