  <link href="css/custom.css" rel="stylesheet" type="text/css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Alegreya', Georgia, serif;
      cursor: default;
      background: #1e1e1b;
    }

    /* ── Cursor ── */
    .cursor {
      position: fixed;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e9e5dd;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 100000;
      mix-blend-mode: difference;
      transition: width 0.25s ease, height 0.25s ease;
    }
    .cursor.hover { width: 50px; height: 50px; }
    @media (max-width: 767px) {
      .cursor { display: none; }
      body { cursor: auto; }
    }

    /* ── Scene ── */
    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Framed photo ── */
    .frame-wrap {
      position: relative;
      width: 50vw;
      aspect-ratio: 3 / 2;
      max-height: 75vh;
      z-index: 2;
      overflow: hidden;
    }
    /* Background image behind photo on hover */
    .frame-bg-hover {
      position: absolute;
      inset: 0% 0%;

width:82%;
margin-left: 13%;
object-fit: contain;
      z-index: 1;
      background: url("brand_assets/backgroundbd.png") center / contain no-repeat;
      clip-path: inset(0 100% 0 0);
    }

    /* Sofia photo: inset inside the organic frame */
    .frame-photo {
      position: absolute;
      inset: 5% 3%;
      z-index: 0;
      background: #1e1e1b url("images/0017_17A.jpg") center / cover no-repeat;
    }
    /* Sybil photo: more inset than Sofia, so colorful edges peek through on hover */
    .frame-photo-sybil {
      position: absolute;
      inset: 25% 25%;
      z-index: 1;
      background: #1e1e1b url("images/Sybilbg.jpg") center / cover no-repeat;
      opacity: 0;
      margin-right:2%;
      margin-bottom: 5%;
    }
    /* newfriome grunge frame */
    .frame-border-hover {
      position: absolute;
      inset: 21% 23%;
      margin-bottom: 5%;

      margin-right: 2%;
      z-index: 2;
      pointer-events: none;
      clip-path: polygon(50% 50%, 0% 0%, 0% 0%);
    }
    .frame-border-hover img {
      width: 100%;
      height: 100%;
      display: block;
      mix-blend-mode: multiply;
    }
    /* Outer organic frame border */
    .frame-border {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }
    .frame-border img {
      width: 100%;
      height: 100%;
      display: block;
      mix-blend-mode: multiply;
    }

    /* ── Grain overlay ── */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }
    .grain::after {
      content: "";
      position: absolute;
      width: 300%;
      height: 300%;
      inset: -150% 0 0 -150%;
      max-width: none;
      background-image: url("images/Noise.png");
      background-size: 300px 300px;
      background-repeat: repeat;
      opacity: 0.3;
      animation: grainAnim 2.5s steps(1) infinite;
    }
    @keyframes grainAnim {
      0%, 100% { background-position: 0 0; }
      10% { background-position: -5% -10%; }
      20% { background-position: -15% 5%; }
      30% { background-position: 7% -25%; }
      40% { background-position: 20% 25%; }
      50% { background-position: -25% 10%; }
      60% { background-position: 15% 5%; }
      70% { background-position: 0% 15%; }
      80% { background-position: 25% 35%; }
      90% { background-position: -10% 10%; }
    }

    /* ── Dust ── */
    .dust {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      background-image: url("images/BGDust.png");
      opacity: 0.05;
    }

    /* ── Letter field ── */
    .letter-field {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      overflow: visible;
    }
    .letter-el {
      position: absolute;
      width: auto;
      height: 25px;
      will-change: transform, opacity;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: auto;
    }

    /* ── Fade-in ── */
    .scene {
      opacity: 0;
      animation: fadeScene 2s ease 0.3s forwards;
    }
    @keyframes fadeScene { to { opacity: 1; } }
  </style>
</head>
<body>

      <div class="nav-dropdown" id="projects-dropdown">
        <div class="desk-nav-inner">
          <p class="desk-nav-label">Projects</p>
          <div class="desk-nav-grid">
            <a href="hard-coded.html" class="desk-nav-cell">
              <img src="images/Hard-Coded-1.jpg" class="desk-nav-cell-img" alt="Hard-Coded">

      </div>
    </div>
  </div>

  <div class="scene" id="scene">
    <div class="frame-wrap" id="frameWrap">
      <div class="frame-bg-hover" id="bgHover"></div>
      <div class="frame-photo" id="bg"></div>
      <div class="frame-photo-sybil" id="bgSybil"></div>
      <div class="frame-border">
        <img src="images/frame.png" alt="">
      </div>
      <div class="frame-border-hover" id="frameBorderHover">
        <img src="brand_assets/newfriome.png" alt="">

  <div class="letter-field" id="letterField"></div>

  <div class="dust"></div>
  <div class="grain"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    /* ── Refs ── */
    const cursor = document.getElementById('cursor');
    const letterField = document.getElementById('letterField');
    const frameWrap = document.getElementById('frameWrap');

    /* ── State ── */
    let currentName = 'sofia';

    /* ── Hover triggers ── */
    const bgHoverEl = document.getElementById('bgHover');
    const frameBorderEl = document.getElementById('frameBorderHover');
    const outerBorder = frameWrap.querySelector('.frame-border');

    /* Clock-sweep clip-path: sweeps clockwise from top-left corner */
    function clockWipe(progress) {
      const sweep = progress * 360;
      const pts = ['50% 50%', '0% 0%'];
      const corners = [
        { rel: 90,  p: '100% 0%' },
        { rel: 180, p: '100% 100%' },
        { rel: 270, p: '0% 100%' },
      ];
      for (const c of corners) {
        if (sweep > c.rel) pts.push(c.p);
      }
      if (progress >= 1) {
        pts.push('0% 0%');
      } else {
        const absAngle = (315 + sweep) % 360;
        const rad = (absAngle - 90) * Math.PI / 180;
        const dx = Math.cos(rad);
        const dy = Math.sin(rad);
        const adx = Math.abs(dx), ady = Math.abs(dy);
        let s;
        if (adx < 1e-6) s = 50 / ady;
        else if (ady < 1e-6) s = 50 / adx;
        else s = Math.min(50 / adx, 50 / ady);
        pts.push(`${(50 + dx * s).toFixed(1)}% ${(50 + dy * s).toFixed(1)}%`);
      }
      return `polygon(${pts.join(', ')})`;
    }

    /* ── Hover in / out ── */
    let isHovered = false;
    const bgSybilEl = document.getElementById('bgSybil');

    function hoverIn() {
      if (isHovered) return;
      isHovered = true;

      // Bg wipe in
      gsap.to(bgHoverEl, { clipPath: 'inset(0 0% 0 0)', duration: 0.75, ease: 'power3.inOut', overwrite: true });

      // Sybil photo fade in
      gsap.to(bgSybilEl, { opacity: 1, duration: 0.4, delay: 0.35, ease: 'power4.in', x:20, overwrite: true });

      // Border clock-sweep in
      const sweepIn = { progress: 0 };
      gsap.to(sweepIn, {
        progress: 1,
        duration: 0.75,
        delay: 0.35,
        ease: 'power2.out',
        onUpdate: () => { frameBorderEl.style.clipPath = clockWipe(sweepIn.progress); }
      });
      // Border slide in from left (match Sybil photo timing)
      gsap.to(frameBorderEl, { x: 20, duration: 0.4, delay: 0.35, ease: 'power4.in', overwrite: true });

      // Swap letters to sybil
      swapTo('sybil');
    }

    function hoverOut() {
      if (!isHovered) return;
      isHovered = false;

      // Bg wipe out
      gsap.to(bgHoverEl, { clipPath: 'inset(0 100% 0 0)', duration: 0.5, ease: 'power2.in', overwrite: true, delay:0.2 });

      // Sybil photo fade out
      gsap.to(bgSybilEl, {x:-10, opacity: 0, duration: 0.35, ease: 'power2.in', delay:0.1, overwrite: true });

      // Border clock-sweep out (reverse)
      const sweepOut = { progress: 1 };
      gsap.to(sweepOut, {
        progress: 0,
        duration: 0.5,
        ease: 'power2.in',
        onUpdate: () => { frameBorderEl.style.clipPath = clockWipe(sweepOut.progress); }
      });
      // Border slide back
      gsap.to(frameBorderEl, { x: 0, duration: 0.5, ease: 'power2.in', overwrite: true });

      // Swap letters back to sofia
      swapTo('sofia');
    }

    frameWrap.addEventListener('mouseenter', hoverIn);
    frameWrap.addEventListener('mouseleave', hoverOut);

    /* ── Slot-based letter swap ── */
    // S O F I A _ C A R T U C C I A
    // S Y B I L _ S O M E T I M E S
    // Matching: pos 0 (S), pos 3 (I) — stay in place
    const sofiaChars = 'sofia cartuccia'.split('');
    const sybilChars = 'sybil sometimes'.split('');

    const LETTER_W = 35;
    const SPACE_W = 50;
    const SWAP_DIST = 45;

    const slots = [];

    for (let i = 0; i < sofiaChars.length; i++) {
      if (sofiaChars[i] === ' ') continue;

      const sc = sofiaChars[i];
      const yc = sybilChars[i];
      const isMatch = sc === yc;

      const sofiaEl = document.createElement('img');
      sofiaEl.className = 'letter-el';
      sofiaEl.src = `brand_assets/Letters/${sc}.png`;
      sofiaEl.alt = sc;
      letterField.appendChild(sofiaEl);
      let sybilEl = null;
      if (!isMatch) {
        sybilEl = document.createElement('img');
        sybilEl.className = 'letter-el';
        sybilEl.src = `brand_assets/Letters/${yc}.png`;
        sybilEl.alt = yc;
        letterField.appendChild(sybilEl);
      }

      slots.push({
        nameIndex: i,
        isMatch,
        sofiaEl,
        sybilEl,
        restRot: (Math.random() - 0.5) * 3,
        x: 0,
        y: 0,
      });
    }

    /* ── Position calculations ── */
    function calcPositions() {
      const rect = frameWrap.getBoundingClientRect();
      const anchorY = rect.top + 10;
      const anchorX = rect.left + rect.width / 2;
      const totalW = 14 * LETTER_W + SPACE_W;
      const startX = anchorX - totalW / 2;

      for (const slot of slots) {
        const i = slot.nameIndex;
        if (i < 5) {
          slot.x = startX + i * LETTER_W + LETTER_W / 2;
        } else {
          slot.x = startX + 5 * LETTER_W + SPACE_W + (i - 6) * LETTER_W + LETTER_W / 2;
        }
        slot.y = anchorY;
      }
    }

    /* ── Initial placement (Sofia visible) ── */
    function initPositions() {
      calcPositions();
      for (const slot of slots) {
        gsap.set(slot.sofiaEl, {
          x: slot.x - 21,
          y: slot.y - 12,
          rotation: slot.restRot,
          opacity: 0.9
        });
        if (slot.sybilEl) {
          gsap.set(slot.sybilEl, {
            x: slot.x - 21,
            y: slot.y - 12 - SWAP_DIST,
            rotation: slot.restRot,
            opacity: 0
          });
        }
      }
    }

    /* ── Swap: scatter outgoing letters to chaos, bring new ones in ── */
    function swapTo(name) {
      if (name === currentName) return;
      currentName = name;
      calcPositions();

      // Chaos area centered around the word formation zone
      const totalW = 14 * LETTER_W + SPACE_W;
      const rect = frameWrap.getBoundingClientRect();
      const anchorX = rect.left + rect.width / 2;
      const anchorY = rect.top + 10;
      const chaosXMin = anchorX - totalW / 2 - 40;
      const chaosXMax = anchorX + totalW / 2 + 40;
      const chaosYMin = anchorY - 60;
      const chaosYMax = anchorY + 60;

      const swapSlots = slots.filter(s => !s.isMatch);

      swapSlots.forEach((slot, idx) => {
        const outEl = name === 'sybil' ? slot.sofiaEl : slot.sybilEl;
        const inEl = name === 'sybil' ? slot.sybilEl : slot.sofiaEl;
        const baseY = slot.y - 12;
        const delay = idx * 0.03 + Math.random() * 0.04;

        // Scatter outgoing letter to a random chaos position, then fade out
        const chaosX = chaosXMin + Math.random() * (chaosXMax - chaosXMin) - 21;
        const chaosY = chaosYMin + Math.random() * (chaosYMax - chaosYMin) - 12;
        const chaosRot = (Math.random() - 0.5) * 60;

        gsap.to(outEl, {
          x: chaosX,
          y: chaosY,
          rotation: chaosRot,
          opacity: 0,
          duration: 0.5,
          delay: delay,
          ease: 'power2.in',
          overwrite: true,
          onComplete: () => {
            // Reset above slot for future reuse
            gsap.set(outEl, { x: slot.x - 21, y: baseY - SWAP_DIST, rotation: slot.restRot, opacity: 0 });
          }
        });

        // Bring incoming letter from a random chaos position into its slot
        const inChaosX = chaosXMin + Math.random() * (chaosXMax - chaosXMin) - 21;
        const inChaosY = chaosYMin + Math.random() * (chaosYMax - chaosYMin) - 12;
        const inChaosRot = (Math.random() - 0.5) * 60;

        gsap.fromTo(inEl,
          { x: inChaosX, y: inChaosY, rotation: inChaosRot, opacity: 0 },
          {
            x: slot.x - 21,
            y: baseY,
            rotation: slot.restRot,
            opacity: 0.9,
            duration: 0.55,
            delay: delay + 0.15,
            ease: 'power2.out',
            overwrite: true
          }
        );
      });
    }

    initPositions();

    /* ── Resize ── */
    window.addEventListener('resize', () => {
      calcPositions();
      for (const slot of slots) {
        const activeEl = currentName === 'sofia' ? slot.sofiaEl : (slot.sybilEl || slot.sofiaEl);
        gsap.set(activeEl, { x: slot.x - 21, y: slot.y - 12 });
        if (slot.sybilEl) {
          const inactiveEl = currentName === 'sofia' ? slot.sybilEl : slot.sofiaEl;
          gsap.set(inactiveEl, { x: slot.x - 21, y: slot.y - 12 - SWAP_DIST, opacity: 0 });
        }
      }
    });
  </script>
  <script src="js/cursor.js"></script>
  <script src="js/nav.js"></script>

</body>
