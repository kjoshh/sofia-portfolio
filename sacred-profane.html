<head>
  <meta charset="utf-8">

  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="css/normalize.css" rel="stylesheet" type="text/css">
  <link href="css/webflow.css" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet" type="text/css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Alegreya', Georgia, serif;
      background: #1e1e1b;
    }

    /* ── Scene ── */
    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Framed photo ── */
    .frame-wrap {
      position: relative;
      width: 45vw;
      aspect-ratio: 3 / 2;
      max-height: 75vh;
      z-index: 2;
      overflow: hidden;
    }
    /* Background image behind photo on hover */
    .frame-bg-hover {
      position: absolute;
      inset: 0% 0%;

width:82%;
margin-left: 13%;
object-fit: contain;
      z-index: 1;
      background: url("brand_assets/backgroundbd.png") center / contain no-repeat;
      clip-path: inset(0 100% 0 0);
    }

    /* Sofia photo: inset inside the organic frame */
    .frame-photo {
      position: absolute;
      inset: 5% 3%;
      z-index: 0;
      background: #1e1e1b url("images/0017_17A.jpg") center / cover no-repeat;
    }
    /* Sybil photo: more inset than Sofia, so colorful edges peek through on hover */
    .frame-photo-sybil {
      position: absolute;
      inset: 25% 25%;
      z-index: 1;
      background: #1e1e1b url("images/Sybilbg.jpg") center / cover no-repeat;
      opacity: 0;
      margin-right:2%;
      margin-bottom: 5%;
    }
    /* newfriome grunge frame */
    .frame-border-hover {
      position: absolute;
      inset: 21% 23%;
      margin-bottom: 5%;

      margin-right: 2%;
      z-index: 2;
      pointer-events: none;
      clip-path: polygon(50% 50%, 0% 100%, 0% 100%);
    }
    .frame-border-hover img {
      width: 100%;
      height: 100%;
      display: block;
      mix-blend-mode: multiply;
    }
    /* Outer organic frame border */
    .frame-border {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }
    .frame-border img {
      width: 100%;
      height: 100%;
      display: block;
      mix-blend-mode: multiply;
    }

    /* ── Grain overlay ── */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }
    .grain::after {
      content: "";
      position: absolute;
      width: 300%;
      height: 300%;
      inset: -150% 0 0 -150%;
      max-width: none;
      background-image: url("images/Noise.png");
      background-size: 300px 300px;
      background-repeat: repeat;
      opacity: 0.3;
      animation: grainAnim 2.5s steps(1) infinite;
    }
    @keyframes grainAnim {
      0%, 100% { background-position: 0 0; }
      10% { background-position: -5% -10%; }
      20% { background-position: -15% 5%; }
      30% { background-position: 7% -25%; }
      40% { background-position: 20% 25%; }
      50% { background-position: -25% 10%; }
      60% { background-position: 15% 5%; }
      70% { background-position: 0% 15%; }
      80% { background-position: 25% 35%; }
      90% { background-position: -10% 10%; }
    }

    /* ── Dust ── */
    .dust {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      background-image: url("images/BGDust.png");
      opacity: 0.15;
    }

    /* ── Vignette ── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 9997;
      pointer-events: none;
      background: radial-gradient(
        ellipse at center,
        transparent 50%,
        rgba(10, 8, 6, 0.5) 100%
      );
    }

    /* ── Letter field ── */
    .letter-field {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      overflow: visible;
    }
    .letter-el {
      position: absolute;
      width: auto;
      height: 1.35vw;
      will-change: transform, opacity;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: auto;
    }

    /* ── Dust particles canvas ── */
    .dust-particles {
      position: fixed;
      inset: 0;
      z-index: 9996;
      pointer-events: none;
    }

    /* ── Fade-in ── */
    .scene {
      opacity: 0;
      animation: fadeScene 2s ease 0.3s forwards;
    }
    @keyframes fadeScene { to { opacity: 1; } }
  </style>
</head>

  <div class="scene" id="scene">
    <div class="frame-wrap" id="frameWrap">
      <div class="frame-bg-hover" id="bgHover"></div>
      <div class="frame-photo" id="bg"></div>
      <div class="frame-photo-sybil" id="bgSybil"></div>
      <div class="frame-border">
        <img src="images/frame.png" alt="">
      </div>

  <div class="letter-field" id="letterField"></div>

  <canvas class="dust-particles" id="dustCanvas"></canvas>
  <div class="vignette"></div>
  <div class="dust"></div>
  <div class="grain"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    /* ── Refs ── */

    const letterField = document.getElementById('letterField');
    const frameWrap = document.getElementById('frameWrap');

    /* ── State ── */
    let currentName = 'sofia';

    /* ── Hover triggers ── */
    const bgHoverEl = document.getElementById('bgHover');
    const frameBorderEl = document.getElementById('frameBorderHover');
    const outerBorder = frameWrap.querySelector('.frame-border');

    /* Clock-sweep clip-path: sweeps clockwise from bottom-left corner */
    function clockWipe(progress) {
      const sweep = progress * 360;
      const pts = ['50% 50%', '0% 100%'];
      const corners = [
        { rel: 90,  p: '0% 0%' },
        { rel: 180, p: '100% 0%' },
        { rel: 270, p: '100% 100%' },
      ];
      for (const c of corners) {
        if (sweep > c.rel) pts.push(c.p);
      }
      if (progress >= 1) {
        pts.push('0% 100%');
      } else {
        const absAngle = (225 + sweep) % 360;
        const rad = (absAngle - 90) * Math.PI / 180;
        const dx = Math.cos(rad);
        const dy = Math.sin(rad);
        const adx = Math.abs(dx), ady = Math.abs(dy);
        let s;
        if (adx < 1e-6) s = 50 / ady;
        else if (ady < 1e-6) s = 50 / adx;
        else s = Math.min(50 / adx, 50 / ady);
        pts.push(`${(50 + dx * s).toFixed(1)}% ${(50 + dy * s).toFixed(1)}%`);
      }
      return `polygon(${pts.join(', ')})`;
    }

    /* ── Hover in / out ── */
    let isHovered = false;
    const bgSybilEl = document.getElementById('bgSybil');
    let sweepTween = null;
    let sweepObj = { progress: 0 };

    function hoverIn() {
      if (isHovered) return;
      isHovered = true;

      // Bg wipe in
      gsap.to(bgHoverEl, { clipPath: 'inset(0 0% 0 0)', duration: 0.75, ease: 'power3.inOut', overwrite: true });

      // Sybil photo fade in
      gsap.to(bgSybilEl, { opacity: 1, duration: 0.4, delay: 0.35, ease: 'power4.in', x:20, overwrite: true });

      // Border clock-sweep in — kill any prior sweep first
      if (sweepTween) sweepTween.kill();
      sweepObj.progress = 0;
      sweepTween = gsap.to(sweepObj, {
        progress: 1,
        duration: 0.75,
        delay: 0.35,
        ease: 'power2.out',
        onUpdate: () => { frameBorderEl.style.clipPath = clockWipe(sweepObj.progress); }
      });
      // Border slide in from left (match Sybil photo timing)
      gsap.to(frameBorderEl, { x: 20, duration: 0.4, delay: 0.35, ease: 'power4.in', overwrite: true });

      // Swap letters to sybil
      swapTo('sybil');
    }

    function hoverOut() {
      if (!isHovered) return;
      isHovered = false;

      // Bg wipe out
      gsap.to(bgHoverEl, { clipPath: 'inset(0 100% 0 0)', duration: 0.5, ease: 'power2.in', overwrite: true, delay:0.2 });

      // Sybil photo fade out
      gsap.to(bgSybilEl, {x:-10, opacity: 0, duration: 0.35, ease: 'power2.in', delay:0.1, overwrite: true });

      // Border clock-sweep out — kill any prior sweep first
      if (sweepTween) sweepTween.kill();
      const currentProgress = sweepObj.progress;
      sweepObj.progress = currentProgress;
      sweepTween = gsap.to(sweepObj, {
        progress: 0,
        duration: 0.5 * currentProgress,
        ease: 'power2.in',
        onUpdate: () => { frameBorderEl.style.clipPath = clockWipe(sweepObj.progress); },
        onComplete: () => { frameBorderEl.style.clipPath = clockWipe(0); }
      });
      // Border slide back
      gsap.to(frameBorderEl, { x: 0, duration: 0.5, ease: 'power2.in', overwrite: true });

      // Swap letters back to sofia
      swapTo('sofia');
    }

    frameWrap.addEventListener('mouseenter', hoverIn);
    frameWrap.addEventListener('mouseleave', hoverOut);

    /* ── Slot-based letter swap ── */
    // S O F I A _ C A R T U C C I A
    // S Y B I L _ S O M E T I M E S
    // Same pos: S@0, I@3 — stay in place
    // Cross-slide: O(1→7), T(9→10), I(13→11) — slide to new position
    // Unique: scatter out / chaos in
    const sofiaChars = 'sofia cartuccia'.split('');
    const sybilChars = 'sybil sometimes'.split('');

    function getLW() { return window.innerWidth * 0.017; }  // ~35px at 1440
    function getSW() { return window.innerWidth * 0.02; }  // ~50px at 1440
    let LETTER_W = getLW();
    let SPACE_W = getSW();

    // Non-space character indices
    const charIndices = [];
    for (let i = 0; i < sofiaChars.length; i++) {
      if (sofiaChars[i] !== ' ') charIndices.push(i);
    }

    // Step 1: Same-position matches
    const samePosSet = new Set();
    for (const ni of charIndices) {
      if (sofiaChars[ni] === sybilChars[ni]) samePosSet.add(ni);
    }

    // Step 2: Cross-position matches (greedy)
    const crossMatches = [];
    const usedSofia = new Set(samePosSet);
    const usedSybil = new Set(samePosSet);
    for (const si of charIndices) {
      if (usedSofia.has(si)) continue;
      for (const yi of charIndices) {
        if (usedSybil.has(yi)) continue;
        if (sofiaChars[si] === sybilChars[yi]) {
          crossMatches.push({ sofiaNameIdx: si, sybilNameIdx: yi });
          usedSofia.add(si);
          usedSybil.add(yi);
          break;
        }
      }
    }

    const unmatchedSofiaIdx = charIndices.filter(i => !usedSofia.has(i));
    const unmatchedSybilIdx = charIndices.filter(i => !usedSybil.has(i));

    // Helper: create letter image
    function makeLetterEl(char) {
      const el = document.createElement('img');
      el.className = 'letter-el';
      el.src = `brand_assets/Letters/${char}.png`;
      el.alt = char;
      letterField.appendChild(el);
      return el;
    }

    // Build slot arrays
    const staySlots = [...samePosSet].map(ni => ({
      nameIdx: ni,
      el: makeLetterEl(sofiaChars[ni]),
      restRot: (Math.random() - 0.5) * 3,
    }));

    const slideSlots = crossMatches.map(m => ({
      sofiaNameIdx: m.sofiaNameIdx,
      sybilNameIdx: m.sybilNameIdx,
      el: makeLetterEl(sofiaChars[m.sofiaNameIdx]),
      restRot: (Math.random() - 0.5) * 3,
    }));

    const sofiaOnlySlots = unmatchedSofiaIdx.map(ni => ({
      nameIdx: ni,
      el: makeLetterEl(sofiaChars[ni]),
      restRot: (Math.random() - 0.5) * 3,
    }));

    const sybilOnlySlots = unmatchedSybilIdx.map(ni => ({
      nameIdx: ni,
      el: makeLetterEl(sybilChars[ni]),
      restRot: (Math.random() - 0.5) * 3,
    }));

    /* ── Position helpers ── */
    function getSlotX(nameIdx, startX) {
      if (nameIdx < 5) return startX + nameIdx * LETTER_W + LETTER_W / 2;
      return startX + 5 * LETTER_W + SPACE_W + (nameIdx - 6) * LETTER_W + LETTER_W / 2;
    }

    function getAnchor() {
      const rect = frameWrap.getBoundingClientRect();
      const anchorY = rect.top + 5;
      const anchorX = rect.left + rect.width / 2;
      const totalW = 14 * LETTER_W + SPACE_W;
      const startX = anchorX - totalW / 2;
      return { anchorX, anchorY, startX, totalW };
    }

    /* ── Initial placement (Sofia visible) ── */
    function initPositions() {
      const { anchorY, startX } = getAnchor();
      for (const s of staySlots) {
        gsap.set(s.el, { x: getSlotX(s.nameIdx, startX) - 21, y: anchorY - 12, rotation: s.restRot, opacity: 0.9 });
      }
      for (const s of slideSlots) {
        gsap.set(s.el, { x: getSlotX(s.sofiaNameIdx, startX) - 21, y: anchorY - 12, rotation: s.restRot, opacity: 0.9 });
      }
      for (const s of sofiaOnlySlots) {
        gsap.set(s.el, { x: getSlotX(s.nameIdx, startX) - 21, y: anchorY - 12, rotation: s.restRot, opacity: 0.9 });
      }
      for (const s of sybilOnlySlots) {
        gsap.set(s.el, { x: getSlotX(s.nameIdx, startX) - 21, y: anchorY - 12, rotation: s.restRot, opacity: 0 });
      }
    }

    /* ── Swap: shared letters slide, unique letters scatter/appear ── */
    function swapTo(name) {
      if (name === currentName) return;
      currentName = name;
      const { anchorX, anchorY, startX, totalW } = getAnchor();

      const chaosXMin = anchorX - totalW / 2 - 40;
      const chaosXMax = anchorX + totalW / 2 + 40;
      const chaosYMin = anchorY - 60;
      const chaosYMax = anchorY + 60;
      function rChaosX() { return chaosXMin + Math.random() * (chaosXMax - chaosXMin) - 21; }
      function rChaosY() { return chaosYMin + Math.random() * (chaosYMax - chaosYMin) - 12; }
      function rChaosRot() { return (Math.random() - 0.5) * 60; }

      // Shared letters slide to their new position
      slideSlots.forEach((slot, idx) => {
        const targetIdx = name === 'sybil' ? slot.sybilNameIdx : slot.sofiaNameIdx;
        const delay = idx * 0.03 + Math.random() * 0.04;
        gsap.to(slot.el, {
          x: getSlotX(targetIdx, startX) - 21, y: anchorY - 12,
          rotation: slot.restRot, opacity: 0.9,
          duration: 0.75, delay, ease: 'power4.in', overwrite: true,
        });
      });

      // Sofia-only letters
      sofiaOnlySlots.forEach((slot, idx) => {
        const delay = idx * 0.03 + Math.random() * 0.04;
        if (name === 'sybil') {
          // Scatter out
          gsap.to(slot.el, {
            x: rChaosX(), y: rChaosY(), rotation: rChaosRot(),
            opacity: 0, duration: 0.5, delay, ease: 'power2.in', overwrite: true,
          });
        } else {
          // Come back from wherever they currently are
          gsap.to(slot.el, {
            x: getSlotX(slot.nameIdx, startX) - 21, y: anchorY - 12,
            rotation: slot.restRot, opacity: 0.9,
            duration: 0.5, delay: delay + 0.25, ease: 'power2.out', overwrite: true,
          });
        }
      });

      // Sybil-only letters
      sybilOnlySlots.forEach((slot, idx) => {
        const delay = idx * 0.03 + Math.random() * 0.04;
        if (name === 'sybil') {
          // Come in from wherever they currently are
          gsap.to(slot.el, {
            x: getSlotX(slot.nameIdx, startX) - 21, y: anchorY - 12,
            rotation: slot.restRot, opacity: 0.9,
            duration: 0.55, delay: delay + 0.15, ease: 'power2.out', overwrite: true,
          });
        } else {
          // Scatter out
          gsap.to(slot.el, {
            x: rChaosX(), y: rChaosY(), rotation: rChaosRot(),
            opacity: 0, duration: 0.5, delay, ease: 'power2.in', overwrite: true,
          });
        }
      });
    }

    initPositions();

    /* ── Mouse parallax: letters shift based on cursor position ── */
    // Each letter gets a random depth factor so they move at different rates
    const allSlots = [
      ...staySlots.map(s => ({ el: s.el })),
      ...slideSlots.map(s => ({ el: s.el })),
      ...sofiaOnlySlots.map(s => ({ el: s.el })),
      ...sybilOnlySlots.map(s => ({ el: s.el })),
    ].map(s => ({
      ...s,
      depth: 0.15 + Math.random() * 0.15,      // how much it moves
      lag: 0.035 + Math.random() * 0.15,          // how fast it follows (lower = laggier)
      flipX: Math.random() > 0.3 ? 1 : -1,     // some letters move opposite direction
      flipY: Math.random() > 0.3 ? 1 : -1,
      cx: 0, cy: 0,                             // current smoothed offset
    }));

    let mouseX = 0.5, mouseY = 0.5;
    const PARALLAX_X = 14;
    const PARALLAX_Y = 10;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX / window.innerWidth;
      mouseY = e.clientY / window.innerHeight;
    });

    function parallaxTick() {
      const tx = (mouseX - 0.5) * 2;
      const ty = (mouseY - 0.5) * 2;

      for (const s of allSlots) {
        const targetX = tx * PARALLAX_X * s.depth * s.flipX;
        const targetY = ty * PARALLAX_Y * s.depth * s.flipY;
        s.cx += (targetX - s.cx) * s.lag;
        s.cy += (targetY - s.cy) * s.lag;
        s.el.style.marginLeft = s.cx + 'px';
        s.el.style.marginTop = s.cy + 'px';
      }
      requestAnimationFrame(parallaxTick);
    }
    requestAnimationFrame(parallaxTick);

    /* ── Floating dust particles ── */
    (function () {
      const canvas = document.getElementById('dustCanvas');
      const ctx = canvas.getContext('2d');
      let W, H;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const NUM = 65;
      const particles = [];

      for (let i = 0; i < NUM; i++) {
        const warmth = Math.random();
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: 0.4 + Math.random() * 1.25,           // radius 0.4–1.6px
          vx: (Math.random() - 0.5) * 0.15,        // very slow horizontal drift
          vy: -0.05 - Math.random() * 0.12,         // slow upward float (like heated dust)
          alpha: 0.08 + Math.random() * 0.18,       // subtle opacity
          // warm tones: mix between pale cream and warm amber
          cr: 200 + Math.floor(warmth * 55),         // 200–255
          cg: 180 + Math.floor(warmth * 40),         // 180–220
          cb: 150 + Math.floor(warmth * 30),          // 150–180
          drift: Math.random() * Math.PI * 2,        // phase for sinusoidal sway
          driftSpeed: 0.003 + Math.random() * 0.006,
          driftAmp: 0.2 + Math.random() * 0.4,
          rot: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.008,
          // irregular shape: 5-7 points with random radii
          shape: (() => {
            const n = 5 + Math.floor(Math.random() * 3);
            return Array.from({ length: n }, (_, j) => ({
              angle: (j / n) * Math.PI * 2,
              wobble: 0.55 + Math.random() * 0.9,
            }));
          })(),
        });
      }

      function tick() {
        ctx.clearRect(0, 0, W, H);

        for (const p of particles) {
          p.drift += p.driftSpeed;
          p.x += p.vx + Math.sin(p.drift) * p.driftAmp;
          p.y += p.vy;

          // wrap around edges
          if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
          if (p.x < -5) p.x = W + 5;
          if (p.x > W + 5) p.x = -5;

          p.rot += p.rotSpeed;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.beginPath();
          const pts = p.shape;
          const n = pts.length;
          // smooth closed blob via midpoints between shape vertices
          const px0 = Math.cos(pts[0].angle) * p.r * pts[0].wobble;
          const py0 = Math.sin(pts[0].angle) * p.r * pts[0].wobble;
          const px1 = Math.cos(pts[1 % n].angle) * p.r * pts[1 % n].wobble;
          const py1 = Math.sin(pts[1 % n].angle) * p.r * pts[1 % n].wobble;
          ctx.moveTo((px0 + px1) / 2, (py0 + py1) / 2);
          for (let k = 1; k <= n; k++) {
            const cur = pts[k % n];
            const nxt = pts[(k + 1) % n];
            const cx = Math.cos(cur.angle) * p.r * cur.wobble;
            const cy = Math.sin(cur.angle) * p.r * cur.wobble;
            const nx = Math.cos(nxt.angle) * p.r * nxt.wobble;
            const ny = Math.sin(nxt.angle) * p.r * nxt.wobble;
            ctx.quadraticCurveTo(cx, cy, (cx + nx) / 2, (cy + ny) / 2);
          }
          ctx.closePath();
          ctx.fillStyle = `rgba(${p.cr},${p.cg},${p.cb},${p.alpha})`;
          ctx.fill();
          ctx.restore();
        }

        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();

    /* ── Resize ── */
    window.addEventListener('resize', () => {
      LETTER_W = getLW();
      SPACE_W = getSW();
      const { anchorY, startX } = getAnchor();
      for (const s of staySlots) {
        gsap.set(s.el, { x: getSlotX(s.nameIdx, startX) - 21, y: anchorY - 12 });
      }
      for (const s of slideSlots) {
        const idx = currentName === 'sofia' ? s.sofiaNameIdx : s.sybilNameIdx;
        gsap.set(s.el, { x: getSlotX(idx, startX) - 21, y: anchorY - 12 });
      }
      for (const s of sofiaOnlySlots) {
        if (currentName === 'sofia') gsap.set(s.el, { x: getSlotX(s.nameIdx, startX) - 21, y: anchorY - 12 });
      }
      for (const s of sybilOnlySlots) {
        if (currentName === 'sybil') gsap.set(s.el, { x: getSlotX(s.nameIdx, startX) - 21, y: anchorY - 12 });
      }
    });
  </script>

  <script src="js/nav.js"></script>

</body>
