<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; cursor: none; }
        canvas { display: block; width: 100%; height: 100%; }
        #cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10;
            mix-blend-mode: difference;
            transition: width 0.2s ease, height 0.2s ease;
        }
    </style>
</head>
<body>
<div id="cursor"></div>
<canvas id="canvas"></canvas>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('canvas');
const cursorEl = document.getElementById('cursor');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// --- 2D Canvas mask for the trail (much smoother than mesh-based) ---
const maskCanvas = document.createElement('canvas');
maskCanvas.width = window.innerWidth;
maskCanvas.height = window.innerHeight;
const maskCtx = maskCanvas.getContext('2d');
maskCtx.fillStyle = '#000';
maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
const maskTexture = new THREE.CanvasTexture(maskCanvas);
maskTexture.minFilter = THREE.LinearFilter;
maskTexture.magFilter = THREE.LinearFilter;

// Load textures
const loader = new THREE.TextureLoader();
const topTex = await loader.loadAsync('images/0017_17A.jpg');
topTex.wrapS = topTex.wrapT = THREE.ClampToEdgeWrapping;
const bottomTex = await loader.loadAsync('brand_assets/newlet.jpg');
bottomTex.wrapS = bottomTex.wrapT = THREE.ClampToEdgeWrapping;

// Shader: top image visible, mouse trail reveals bottom image
const revealMat = new THREE.ShaderMaterial({
    uniforms: {
        uTop: { value: topTex },
        uBottom: { value: bottomTex },
        uMask: { value: maskTexture },
        uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        uTopSize: { value: new THREE.Vector2(topTex.image.width, topTex.image.height) },
        uBottomSize: { value: new THREE.Vector2(bottomTex.image.width, bottomTex.image.height) }
    },
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform sampler2D uTop;
        uniform sampler2D uBottom;
        uniform sampler2D uMask;
        uniform vec2 uResolution;
        uniform vec2 uTopSize;
        uniform vec2 uBottomSize;
        varying vec2 vUv;

        vec2 coverUV(vec2 uv, vec2 texSize, vec2 screenSize) {
            float screenAspect = screenSize.x / screenSize.y;
            float texAspect = texSize.x / texSize.y;
            vec2 scale = vec2(1.0);
            if (texAspect > screenAspect) {
                // Image wider than screen — fit height, crop width
                scale.x = screenAspect / texAspect;
            } else {
                // Image taller than screen — fit width, crop height
                scale.y = texAspect / screenAspect;
            }
            return (uv - 0.5) * scale + 0.5;
        }

        void main() {
            vec2 topUV = coverUV(vUv, uTopSize, uResolution);
            vec2 bottomUV = coverUV(vUv, uBottomSize, uResolution);

            vec4 top = texture2D(uTop, topUV);
            vec4 bottom = texture2D(uBottom, bottomUV);
            float mask = texture2D(uMask, vUv).r;

            mask = smoothstep(0.0, 0.4, mask);

            gl_FragColor = mix(top, bottom, mask);
        }
    `
});

const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), revealMat);
scene.add(quad);

// --- Mouse tracking ---
const mouse = { x: -1000, y: -1000 };
let prevMouse = { x: -1000, y: -1000 };
let mouseInside = false;
let firstMove = true;

window.addEventListener('mousemove', (e) => {
    mouseInside = true;
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    cursorEl.style.left = e.clientX + 'px';
    cursorEl.style.top = e.clientY + 'px';
    if (firstMove) {
        prevMouse.x = mouse.x;
        prevMouse.y = mouse.y;
        firstMove = false;
    }
});
window.addEventListener('mouseleave', () => { mouseInside = false; });

// Touch support
window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    mouseInside = true;
    const t = e.touches[0];
    mouse.x = t.clientX;
    mouse.y = t.clientY;
    if (firstMove) {
        prevMouse.x = mouse.x;
        prevMouse.y = mouse.y;
        firstMove = false;
    }
}, { passive: false });
window.addEventListener('touchstart', (e) => {
    mouseInside = true;
    const t = e.touches[0];
    mouse.x = t.clientX;
    mouse.y = t.clientY;
    prevMouse.x = t.clientX;
    prevMouse.y = t.clientY;
    firstMove = false;
});
window.addEventListener('touchend', () => { mouseInside = false; });

// --- Paint the mask ---
function paintTrail() {
    const dx = mouse.x - prevMouse.x;
    const dy = mouse.y - prevMouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 1 || !mouseInside) {
        prevMouse.x = mouse.x;
        prevMouse.y = mouse.y;
        return;
    }

    // Interpolate between prev and current for smooth strokes
    const steps = Math.max(1, Math.floor(dist / 4));
    const speed = Math.min(dist, 100);
    const radius = 50 + speed * 0.3;

    for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const px = prevMouse.x + dx * t;
        const py = prevMouse.y + dy * t;

        const gradient = maskCtx.createRadialGradient(px, py, 0, px, py, radius);
        gradient.addColorStop(0, 'rgba(255, 255, 255, 0.04)');
        gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.02)');
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        maskCtx.fillStyle = gradient;
        maskCtx.fillRect(px - radius, py - radius, radius * 2, radius * 2);
    }

    prevMouse.x = mouse.x;
    prevMouse.y = mouse.y;
}

// --- Slow fade: slightly darken the mask each frame ---
function fadeMask() {
    maskCtx.fillStyle = 'rgba(0, 0, 0, 0.025)';
    maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
}

// Resize
window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    maskCanvas.width = window.innerWidth;
    maskCanvas.height = window.innerHeight;
    maskCtx.fillStyle = '#000';
    maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
    revealMat.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    paintTrail();
    fadeMask();

    maskTexture.needsUpdate = true;
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
