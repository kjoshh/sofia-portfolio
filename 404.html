  <style>html,body{background:#292823}</style>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">

  <style>
    .four-oh-four {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 2;
    }
    .four-oh-four .star-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 2rem;
      opacity: 0.6;
    }
    .four-oh-four h1 {
      height: 0.75em;
      font-family: 'Alegreya', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 400;
      color: #d4cfc4;
      margin: 0 0 0.5rem;
      letter-spacing: -0.03em;
    }
    .four-oh-four p {
      font-family: 'Alegreya', serif;
      font-size: 1.15rem;
      color: #8a8578;
      margin: 0 0 2rem;
      line-height: 1.7;
    }
    .four-oh-four a {
      font-family: 'Alegreya', serif;
      font-size: 1rem;
      color: #d4cfc4;
      text-decoration: none;
      border-bottom: 1px solid #5a5548;
      padding-bottom: 2px;
      transition: border-color 0.3s ease, opacity 0.3s ease;
    }
    .four-oh-four a:hover {
      border-color: #d4cfc4;
      opacity: 0.8;
    }
    .four-oh-four a:focus-visible {
      outline: 2px solid #d4cfc4;
      outline-offset: 4px;
    }
    .four-oh-four a:active {
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="dusti"></div>
  <div class="grain"></div>

  <div class="four-oh-four">
    <img src="https://res.cloudinary.com/dnvwadmaj/image/upload/w_80,f_auto,q_auto/star_vir8ah.png" alt="" class="star-icon">
    <h1>404</h1>
    <p>This page doesn't exist :(</p>
    <a href="index.html">Back to home</a>
  </div>
</body>
