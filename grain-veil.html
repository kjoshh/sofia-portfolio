<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sybil Sometimes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: Post;
      src: url('fonts/Post.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0908;
      --bg-warm: #1a1714;
      --text: #e9e5dd;
      --text-dim: rgba(233, 229, 221, 0.45);
      --accent: #c8a87c;
    }

    html {
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Alegreya, serif;
      min-height: 200vh;
      cursor: default;
    }

    /* ══════════════════════════════════════════
       LAYER STACK (bottom to top):
       1. dark-wash (z:1)        — warm radial base
       2. grain-fine (z:5)       — permanent subtle grain
       3. dust (z:6)             — permanent dust
       4. hero / scroll (z:10)   — CONTENT
       5. grain-overlay (z:20)   — living grain ON TOP of content (never fully opaque)
       6. blackout (z:30)        — solid dark cover that fades away
       ══════════════════════════════════════════ */

    /* ── 1. Warm radial base ── */
    .dark-wash {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at 50% 40%, var(--bg-warm) 0%, var(--bg) 70%);
      pointer-events: none;
    }

    /* ── 2. Permanent fine grain ── */
    .grain-fine {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }

    .grain-fine::after {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      inset: -50% 0 0 -50%;
      background-image: url("images/Noise.png");
      background-size: 180px 180px;
      background-repeat: repeat;
      opacity: 0.24;
      animation: grain-fine-shift 3s steps(1) infinite;
    }

    @keyframes grain-fine-shift {
      0%, 100% { background-position: 0 0; }
      14% { background-position: -8% -12%; }
      28% { background-position: 12% 6%; }
      42% { background-position: -3% -18%; }
      57% { background-position: 18% 14%; }
      71% { background-position: -14% 3%; }
      85% { background-position: 6% -8%; }
    }

    /* ── 3. Permanent dust ── */
    .dust {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 6;
      background-image: url("images/BGDust.png");
      background-size: cover;
      opacity: 0.15;
    }

    /* ── 5. Living grain overlay — sits ON TOP of content ── */
    .grain-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
      transition: opacity 4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .grain-overlay::after {
      content: "";
      position: absolute;
      width: 300%;
      height: 300%;
      inset: -150% 0 0 -150%;
      background-image: url("images/Noise.png");
      background-size: 300px 300px;
      background-repeat: repeat;
      opacity: 0.5;
      animation: grain-shift 1.8s steps(1) infinite;
    }

    @keyframes grain-shift {
      0%, 100% { background-position: 0 0; }
      10% { background-position: -5% -10%; }
      20% { background-position: -15% 5%; }
      30% { background-position: 7% -25%; }
      40% { background-position: 20% 25%; }
      50% { background-position: -25% 10%; }
      60% { background-position: 15% 5%; }
      70% { background-position: 0% 15%; }
      80% { background-position: 25% 35%; }
      90% { background-position: -10% 10%; }
    }

    /* ── 6. Blackout — solid dark that fades to reveal everything ── */
    .blackout {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: var(--bg);
      pointer-events: none;
      transition: opacity 4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ══════════════════════════════════════════
       CONTENT
       ══════════════════════════════════════════ */

    .hero {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      gap: 2rem;
    }

    .hero-name {
      font-family: Post, serif;
      font-size: clamp(2rem, 7vw, 5.5rem);
      letter-spacing: 0.04em;
      color: var(--text);
      text-align: center;
      opacity: 0;
      transform: scale(1.03);
      filter: blur(16px);
      transition: opacity 4.5s cubic-bezier(0.22, 1, 0.36, 1),
                  filter 5s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .hero-name.developed {
      opacity: 1;
      filter: blur(0px);
      transform: scale(1);
    }

    .hero-subtitle {
      font-family: Alegreya, serif;
      font-size: clamp(0.7rem, 1.2vw, 0.95rem);
      font-style: italic;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      filter: blur(6px);
      transition: opacity 3s ease,
                  transform 3s ease,
                  filter 3s ease;
    }

    .hero-subtitle.developed {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0px);
    }

    /* ── Scroll zone ── */
    .scroll-zone {
      position: relative;
      z-index: 10;
      padding: 0 2rem 8rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .develop-item {
      opacity: 0;
      transform: translateY(24px);
      filter: blur(8px);
      transition: opacity 2s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 2s cubic-bezier(0.22, 1, 0.36, 1),
                  filter 2.5s cubic-bezier(0.22, 1, 0.36, 1);
      margin-bottom: 3rem;
    }

    .develop-item.revealed {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0px);
    }

    /* ── Scroll indicator ── */
    .scroll-hint {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 55;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      opacity: 0;
      transition: opacity 2s ease;
    }

    .scroll-hint.visible {
      opacity: 1;
    }

    .scroll-hint.hidden {
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .scroll-hint-text {
      font-family: Alegreya, serif;
      font-style: italic;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: var(--text-dim);
    }

    .scroll-hint-line {
      width: 1px;
      height: 28px;
      background: linear-gradient(to bottom, var(--text-dim), transparent);
      animation: scroll-pulse 2.5s ease-in-out infinite;
    }

    @keyframes scroll-pulse {
      0%, 100% { opacity: 0.3; transform: scaleY(0.6); }
      50% { opacity: 1; transform: scaleY(1); }
    }

    /* ── Nav links ── */
    .develop-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem 0 1rem;
    }

    .develop-nav a {
      font-family: Alegreya, serif;
      font-size: clamp(0.85rem, 1.4vw, 1.05rem);
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-decoration: none;
      position: relative;
      transition: color 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .develop-nav a::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0%;
      height: 1px;
      background: var(--text);
      transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .develop-nav a:hover,
    .develop-nav a:focus-visible {
      color: var(--text);
    }

    .develop-nav a:hover::after,
    .develop-nav a:focus-visible::after {
      width: 100%;
    }

    .develop-nav a:active { opacity: 0.7; }

    .nav-star {
      height: 18px;
      width: auto;
      opacity: 0.5;
      transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .develop-nav:hover .nav-star {
      opacity: 0.8;
      transform: rotate(90deg);
    }

    /* ── Enter link ── */
    .enter-wrap {
      text-align: center;
      padding: 3rem 0;
    }

    .enter-link {
      font-family: Alegreya, serif;
      font-size: clamp(0.85rem, 1.3vw, 1rem);
      font-style: italic;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      color: var(--text-dim);
      text-decoration: none;
      position: relative;
      transition: color 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .enter-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0%;
      height: 1px;
      background: var(--accent);
      transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .enter-link:hover,
    .enter-link:focus-visible { color: var(--text); }

    .enter-link:hover::after,
    .enter-link:focus-visible::after { width: 100%; }

    .enter-link:active { opacity: 0.7; }

    /* ── Divider ── */
    .grain-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--text-dim), transparent);
      margin: 0 auto 3rem;
      opacity: 0.5;
    }

    /* ── Tagline ── */
    .tagline {
      text-align: center;
      font-family: Alegreya, serif;
      font-style: italic;
      font-size: clamp(0.8rem, 1.1vw, 0.9rem);
      color: var(--text-dim);
      line-height: 1.8;
      letter-spacing: 0.06em;
    }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      .develop-nav { gap: 1.5rem; }
      .develop-nav a { font-size: 0.85rem; }
      .scroll-zone { padding: 0 1.5rem 6rem; }
    }

    @media (max-width: 479px) {
      .develop-nav { flex-direction: column; gap: 1rem; }
      .nav-star { display: none; }
    }
  </style>
</head>
<body>

  <!-- Layer 1: warm base -->
  <div class="dark-wash"></div>

  <!-- Layer 2-3: permanent texture -->
  <div class="grain-fine"></div>
  <div class="dust"></div>

  <!-- Layer 4: content -->
  <section class="hero">
    <div class="hero-name" id="heroName">Sybil Sometimes</div>
    <div class="hero-subtitle" id="heroSubtitle">Sofia Cartuccia</div>
  </section>

  <section class="scroll-zone">
    <div class="develop-item" data-develop>
      <div class="grain-divider"></div>
    </div>
    <div class="develop-item" data-develop>
      <p class="tagline">an oracle in a cave in the Sibillini mountains —<br>an actress on a stage in a London theatre —<br>a photographer, sometimes.</p>
    </div>
    <div class="develop-item" data-develop>
      <nav class="develop-nav">
        <a href="index.html">Projects</a>
        <img src="brand_assets/starbright.png" class="nav-star" alt="">
        <a href="archive.html">Archive</a>
        <img src="brand_assets/starbright.png" class="nav-star" alt="">
        <a href="about.html">About</a>
      </nav>
    </div>
    <div class="develop-item" data-develop>
      <div class="enter-wrap">
        <a href="index.html" class="enter-link">enter the portfolio</a>
      </div>
    </div>
  </section>

  <!-- Layer 5: living grain on top of content -->
  <div class="grain-overlay" id="grainOverlay"></div>

  <!-- Layer 6: blackout cover — fades away to reveal -->
  <div class="blackout" id="blackout"></div>

  <!-- Scroll hint (highest z) -->
  <div class="scroll-hint" id="scrollHint">
    <span class="scroll-hint-text">scroll</span>
    <div class="scroll-hint-line"></div>
  </div>

  <script>
    (function () {
      const blackout = document.getElementById('blackout');
      const grainOverlay = document.getElementById('grainOverlay');
      const heroName = document.getElementById('heroName');
      const heroSubtitle = document.getElementById('heroSubtitle');
      const scrollHint = document.getElementById('scrollHint');
      const developItems = document.querySelectorAll('[data-develop]');

      /* ═══════════════════════════════════════
         PHASE 1 — Darkroom development sequence

         t=0s    : Blackout (solid dark) + grain on top = dense static
         t=1.5s  : Blackout starts fading — grain texture shows through
         t=2s    : Name starts developing (blur→clear, opacity→1)
         t=3.5s  : Blackout nearly gone, subtitle develops
         t=5.5s  : Grain overlay thins — print is nearly done
         t=7s    : Scroll hint appears
         ═══════════════════════════════════════ */

      // Dense grain overlay starts strong
      grainOverlay.style.opacity = '1';

      // t=1.5s — blackout lifts, grain static visible
      setTimeout(() => {
        blackout.style.opacity = '0';
      }, 1500);

      // t=2s — name materializes through the grain
      setTimeout(() => {
        heroName.classList.add('developed');
        grainOverlay.style.opacity = '0.6';
      }, 2000);

      // t=4s — subtitle develops, grain thins more
      setTimeout(() => {
        heroSubtitle.classList.add('developed');
        grainOverlay.style.opacity = '0.3';
      }, 4000);

      // t=6s — grain settles to permanent level
      setTimeout(() => {
        grainOverlay.style.opacity = '0.15';
      }, 6000);

      // t=7s — scroll hint
      setTimeout(() => {
        scrollHint.classList.add('visible');
      }, 7000);

      /* ═══════════════════════════════════════
         PHASE 2 — Scroll-driven reveals
         ═══════════════════════════════════════ */

      let ticking = false;

      function onScroll() {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(() => {
          const scrollY = window.scrollY;
          const vh = window.innerHeight;

          // Grain thins as you scroll deeper
          const scrollRatio = Math.min(scrollY / (vh * 0.6), 1);
          const grainOp = 0.15 - (scrollRatio * 0.10);
          grainOverlay.style.opacity = Math.max(grainOp, 0.04).toString();

          // Hide scroll hint
          if (scrollY > 40) scrollHint.classList.add('hidden');

          // Reveal items
          developItems.forEach(item => {
            const rect = item.getBoundingClientRect();
            if (rect.top < vh * 0.82) item.classList.add('revealed');
          });

          ticking = false;
        });
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
  </script>
</body>
</html>
