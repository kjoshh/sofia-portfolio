        <div class="nav-dropdown-wrap" aria-haspopup="true" aria-expanded="false">

        </div>
        <a href="archive.html" class="nav-link">Archive</a>
        <a href="about.html" class="nav-link">About</a>

      <div class="nav-dropdown" id="projects-dropdown">
        <div class="desk-nav-inner">
          <p class="desk-nav-label">Projects</p>

              <span class="desk-nav-cell-label">Hard-Coded</span>
            </a>
            <a href="forgetting-dreams.html" class="desk-nav-cell">

            </a>

  <main>
  <div class="scene" id="scene">
    <div class="frame-wrap" id="frameWrap">
      <div class="frame-bg-hover" id="bgHover"></div>
      <div class="frame-photo" id="bg"></div>
      <div class="frame-photo-sybil" id="bgSybil"></div>
      <div class="frame-border">
        <picture>
          <source media="(max-width: 991px)" srcset="images-neu/frame-mobile.png">
          <img src="images-neu/frame-desk.png" alt="">
        </picture>
      </div>
      <div class="frame-border-hover" id="frameBorderHover">
        <img src="images-neu/frame-sybil.png" alt="">
      </div>
    </div>
    <div class="letter-field" id="letterField"></div>
  </div>

  <canvas class="dust-particles" id="dustCanvas"></canvas>
  <div class="vignette"></div>
  <div class="dust"></div>
  <div class="grain"></div>
  </main>

  <div class="mob-sheet mob-sheet--top" id="mobSheet">
    <div class="mob-sheet-header" id="mobSheetToggle" role="button" tabindex="0" aria-expanded="false" aria-label="Navigation menu">
      <a href="index.html" class="mob-sheet-logo-link" onclick="event.stopPropagation()">
        <img src="images-neu/logo.png" class="mob-sheet-logo" alt="Sofia Cartuccia">
      </a>
      <div class="mob-sheet-header-right">
        <img src="images-neu/star.png" class="mob-sheet-icon" alt="menu">
        <span class="mob-sheet-menu-label" data-closed="MENU" data-open="CLOSE"></span>
      </div>
      <div class="mob-sheet-header-links">
        <a href="archive.html" class="mob-sheet-link" onclick="event.stopPropagation()">Archive</a>

    </div>
    <div class="mob-sheet-body">
      <p class="mob-sheet-section-label">Projects</p>
      <div class="mob-sheet-grid">
        <a href="hard-coded.html" class="mob-sheet-cell">

          <span class="mob-sheet-cell-label">Hard-Coded</span>
