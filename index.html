<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sybil Sometimes — Sofia Cartuccia</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <meta name="theme-color" content="#1e1e1b">
  <meta name="view-transition" content="same-origin">
  <link href="css/normalize.css" rel="stylesheet" type="text/css">
  <link href="css/webflow.css" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet" type="text/css">
</head>
<body class="landing-page">

  <div class="page-transition" style="display: block; opacity: 1;"></div>

  <div data-collapse="medium" class="navbar main-nav">
    <div class="wrapin">
      <div class="nav-bg"></div>
      <nav role="navigation" class="nav-menu">
        <a href="index.html" class="nav-link logo-link">
          <span class="nav-logo-wrap">
            <img src="brand_assets/SofiaFullname.png" alt="Sofia Cartuccia" class="nav-logo-img nav-logo-top">
          </span>
        </a>
        <img src="brand_assets/starbright.png" class="nav-star-sep" alt="">
        <div class="nav-dropdown-wrap">
          <a href="#" class="nav-link">Projects</a>
        </div>
        <a href="archive.html" class="nav-link">Archive</a>
        <a href="about.html" class="nav-link">About</a>
      </nav>
      <div class="nav-dropdown" id="projects-dropdown">
        <div class="desk-nav-inner">
          <p class="desk-nav-label">Projects</p>
          <div class="desk-nav-grid">
            <a href="hard-coded.html" class="desk-nav-cell">
              <img src="images/Hard-Coded-1.jpg" class="desk-nav-cell-img" alt="Hard-Coded">
              <span class="desk-nav-cell-label">Hard-Coded</span>
            </a>
            <a href="forgetting-dreams.html" class="desk-nav-cell">
              <img src="images/Forgettingdreams-1-p-500.jpg" class="desk-nav-cell-img" alt="Forgetting Dreams">
              <span class="desk-nav-cell-label">Forgetting Dreams</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="scene" id="scene">
    <div class="frame-wrap" id="frameWrap">
      <div class="frame-bg-hover" id="bgHover"></div>
      <div class="frame-photo" id="bg"></div>
      <div class="frame-photo-sybil" id="bgSybil"></div>
      <div class="frame-border">
        <img src="images/frame.png" alt="">
      </div>
      <div class="frame-border-hover" id="frameBorderHover">
        <img src="brand_assets/newfriome.png" alt="">
      </div>
    </div>
    <div class="letter-field" id="letterField"></div>
  </div>

  <canvas class="dust-particles" id="dustCanvas"></canvas>
  <div class="vignette"></div>
  <div class="dust"></div>
  <div class="grain"></div>

  <div class="mob-sheet mob-sheet--top" id="mobSheet">
    <div class="mob-sheet-header" id="mobSheetToggle">
      <a href="index.html" class="mob-sheet-logo-link" onclick="event.stopPropagation()">
        <img src="brand_assets/SofiaFullname.png" class="mob-sheet-logo" alt="Sofia Cartuccia">
      </a>
      <div class="mob-sheet-header-right">
        <img src="brand_assets/staryo.png" class="mob-sheet-icon" alt="menu">
        <span class="mob-sheet-menu-label" data-closed="MENU" data-open="CLOSE"></span>
      </div>
      <div class="mob-sheet-header-links">
        <a href="archive.html" class="mob-sheet-link" onclick="event.stopPropagation()">Archive</a>
        <a href="about.html" class="mob-sheet-link" onclick="event.stopPropagation()">About</a>
      </div>
    </div>
    <div class="mob-sheet-body">
      <p class="mob-sheet-section-label">Projects</p>
      <div class="mob-sheet-grid">
        <a href="hard-coded.html" class="mob-sheet-cell">
          <img src="images/Hard-Coded-1.jpg" class="mob-sheet-cell-img" alt="Hard-Coded">
          <span class="mob-sheet-cell-label">Hard-Coded</span>
        </a>
        <a href="forgetting-dreams.html" class="mob-sheet-cell">
          <img src="images/Forgettingdreams-1-p-500.jpg" class="mob-sheet-cell-img" alt="Forgetting Dreams">
          <span class="mob-sheet-cell-label">Forgetting Dreams</span>
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <script src="js/index.js"></script>

  <script src="js/nav.js"></script>
  <script src="js/mob-sheet.js"></script>
  <script src="js/transition.js"></script>

</body>
</html>
