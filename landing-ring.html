<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sofia Cartuccia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link href="images/favicon.ico" rel="shortcut icon" type="image/x-icon">
  <style>
    @font-face {
      font-family: Post;
      src: url('fonts/Post.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-sofia: #292823;
      --text-warm: #e9e5dd;
      --text-dim: rgba(233, 229, 221, 0.35);
    }

    html, body {
      height: 100dvh;
      overflow: hidden;
    }

    body {
      background: var(--bg-sofia);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
    }

    /* ── Dust overlay ── */
    .dusti {
      width: 100vw;
      height: 100vh;
      position: fixed;
      pointer-events: none;
      opacity: 0.05;
      background-image: url('images/BGDust.png');
      z-index: 1;
    }

    /* ── Grain overlay ── */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }

    .grain::after {
      content: "";
      position: absolute;
      width: 300%;
      height: 300%;
      inset: -150% 0% 0% -150%;
      background-image: url('images/Noise.png');
      background-size: 300px;
      opacity: 0.22;
      animation: grain 2.5s steps(1) infinite;
    }

    @keyframes grain {
      0%, 100% { background-position: 0 0; }
      10% { background-position: -5% -10%; }
      20% { background-position: -15% 5%; }
      30% { background-position: 7% -25%; }
      40% { background-position: 20% 25%; }
      50% { background-position: -25% 10%; }
      60% { background-position: 15% -5%; }
      70% { background-position: 0% 15%; }
      80% { background-position: 25% 35%; }
      90% { background-position: -10% 10%; }
    }

    /* ── Ring landing ── */
    .ring-landing {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .ring-link {
      position: relative;
      display: block;
      width: min(55vw, 500px);
      text-decoration: none;
      cursor: pointer;
    }

    .ring-link:focus-visible {
      outline: 1px solid rgba(233, 229, 221, 0.3);
      outline-offset: 16px;
      border-radius: 50%;
    }

    .ring-link:active .ring-star {
      transform: translate(-50%, -50%) scale(0.92);
    }

    /* ── SVG ring ── */
    .ring-svg {
      display: block;
      width: 100%;
      height: auto;
      animation: spin-ring 45s linear infinite;
      will-change: transform;
    }

    .ring-svg text {
      font-family: Post, serif;
      font-size: 23px;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      fill: rgba(233, 229, 221, 0.7);
      transition: fill 0.5s ease;
    }

    .ring-link:hover .ring-svg text {
      fill: rgba(233, 229, 221, 1);
    }

    @keyframes spin-ring {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Center star ── */
    .ring-star {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 64px;
      height: 64px;
      animation: spin-star 30s linear infinite;
      will-change: transform;
      transition: filter 0.5s ease;
      pointer-events: none;
    }

    .ring-link:hover .ring-star {
      filter: drop-shadow(0 0 20px rgba(233, 229, 221, 0.25));
    }

    @keyframes spin-star {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(-360deg); }
    }

    /* ── Hint text ── */
    .ring-hint {
      font-family: Alegreya, serif;
      font-style: italic;
      font-size: 14px;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: lowercase;
      text-decoration: none;
      transition: color 0.4s ease;
      pointer-events: none;
    }

    .ring-link:hover ~ .ring-hint {
      color: rgba(233, 229, 221, 0.55);
    }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      .ring-link {
        width: min(75vw, 400px);
      }
      .ring-star {
        width: 52px;
        height: 52px;
      }
    }

    @media (max-width: 479px) {
      .ring-link {
        width: 85vw;
      }
      .ring-star {
        width: 44px;
        height: 44px;
      }
      .grain::after {
        opacity: 0.16;
        animation-duration: 3s;
      }
    }

    /* ── Entrance: hidden until GSAP animates ── */
    .ring-svg,
    .ring-star,
    .ring-hint {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="dusti"></div>
  <div class="grain"></div>

  <main class="ring-landing">
    <a href="index.html" class="ring-link" id="ringLink">
      <svg class="ring-svg" viewBox="0 0 600 600" aria-label="Sofia Cartuccia and Sybil Sometimes">
        <defs>
          <path id="textCircle"
            d="M 300,300 m -240,0 a 240,240 0 1,1 480,0 a 240,240 0 1,1 -480,0" />
        </defs>
        <text>
          <textPath href="#textCircle"
            textLength="1470"
            lengthAdjust="spacing">SOFIA CARTUCCIA ✦ SYBIL SOMETIMES ✦ </textPath>
        </text>
      </svg>
      <img class="ring-star" src="brand_assets/starbright.png" alt="" aria-hidden="true">
    </a>
    <p class="ring-hint">click to enter</p>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    // Entrance animation
    const tl = gsap.timeline({ delay: 0.3 });

    tl.to('.ring-star', {
      opacity: 1,
      scale: 1,
      duration: 0.8,
      ease: 'back.out(1.4)',
    }, 0);

    tl.fromTo('.ring-star', {
      scale: 0.7,
    }, {
      scale: 1,
      duration: 0.8,
      ease: 'back.out(1.4)',
    }, 0);

    tl.to('.ring-svg', {
      opacity: 1,
      duration: 1,
      ease: 'power2.out',
    }, 0.3);

    tl.to('.ring-hint', {
      opacity: 1,
      duration: 0.8,
      ease: 'power2.out',
    }, 0.9);

    // Exit animation on click
    document.getElementById('ringLink').addEventListener('click', function(e) {
      e.preventDefault();
      const dest = this.href;

      gsap.to('.ring-svg', {
        scale: 0.9,
        opacity: 0,
        duration: 0.4,
        ease: 'power2.in',
      });

      gsap.to('.ring-star', {
        opacity: 0,
        duration: 0.4,
        ease: 'power2.in',
      });

      gsap.to('.ring-hint', {
        opacity: 0,
        duration: 0.3,
        ease: 'power2.in',
      });

      setTimeout(function() {
        window.location = dest;
      }, 450);
    });
  </script>
</body>
</html>
