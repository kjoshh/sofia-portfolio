  <script>
document.addEventListener("DOMContentLoaded", () => {
  function getSpreadStrength() {
  const base = Math.min(window.innerWidth, 1920); // cap at 1920
  return base * 0.6; // tweakable
}
  const gallery = document.querySelector(".gallery");
  const zoomOutBtn = document.getElementById("zoom-out");
  const zoomInBtn = document.getElementById("zoom-in");
  const dragLayer = document.querySelector("#drag-layer");
  // drag layer should NOT block clicks initially
  dragLayer.style.pointerEvents = "none";
  const totalRows = 20;
  const imagesPerRow = 60;
  const totalImages = totalRows * imagesPerRow;
 let zoomLevel = 0;
  const images = [];
  // ----------------------------------
  // GET WEBFLOW IMAGES
  // ----------------------------------
  const sourceImages = Array.from(
    document.querySelectorAll("img.archive-img")
  );
  if (!sourceImages.length) {
    console.warn("Keine .archive-img Bilder gefunden.");
    return;
  }
  const imageSources = sourceImages.map(img => img.src);
  sourceImages.forEach(img => img.remove());
  let lastIndex = -1;
  // ----------------------------------
  // BUILD GRID
  // ----------------------------------
gallery.style.visibility = "hidden";
for (let i = 0; i < totalImages; i++) {
  const wrapper = document.createElement("div");
  wrapper.className = "img";
  // center image inside square
  wrapper.style.display = "flex";
  wrapper.style.alignItems = "center";
  wrapper.style.justifyContent = "center";
  wrapper.style.transform = "scale(1)";
  const size = 40 + Math.random() * 20;
  wrapper.style.width = `${size}px`;
  wrapper.style.height = `${size}px`;
  const imgElement = document.createElement("img");
  let randomIndex;
  const aboveIndex = i - imagesPerRow;
  do {
    randomIndex = Math.floor(Math.random() * imageSources.length);
  } while (
    randomIndex === lastIndex ||
    (
      aboveIndex >= 0 &&
      imageSources[randomIndex] ===
      images[aboveIndex].querySelector("img").src
    )
  );
  lastIndex = randomIndex;
  imgElement.src = imageSources[randomIndex];
  // important: AFTER creation
  imgElement.style.maxWidth = "100%";
  imgElement.style.maxHeight = "100%";
  imgElement.style.objectFit = "contain";
  imgElement.style.display = "block";
  wrapper.appendChild(imgElement);
  gallery.appendChild(wrapper);
  images.push(wrapper);
}
let loadedCount = 0;
let revealTriggered = false;
images.forEach(wrapper => {
  const img = wrapper.querySelector("img");
  // If already cached
  if (img.complete) {
    loadedCount++;
    checkAllLoaded();
  } 
  // If still loading
  else {
    img.addEventListener("load", () => {
      loadedCount++;
      checkAllLoaded();
    });
  }
});
function checkAllLoaded() {
  // prevent multiple triggers
  if (revealTriggered) return;
  if (loadedCount >= totalImages * 0.3) {
    revealTriggered = true;
    revealGallery();
  }
}
function revealGallery() {
  gallery.style.visibility = "visible";
  gsap.from(images, {
    scale: 0.8,
    opacity: 0,
    duration: 0.6,
    stagger: {
      amount: 1.2,
      grid: [totalRows, imagesPerRow],
      from: "random",
    },
    ease: "power2.out"
  });
}
  // =========================
  // ZOOM OUT
  // =========================
zoomOutBtn.addEventListener("click", () => {
  if (zoomLevel === 0) return;
  zoomLevel = 0;
  updateZoomButtons();
  dragLayer.style.pointerEvents = "none";
  // Stop dragging
  isDragging = false;
// Stop dragging
isDragging = false;
// Smoothly return to center
targetX = 0;
targetY = 0;
  // Reset images
  gsap.to(images, {
    x: 0,
    y: 0,
    scale: 1,
    duration: 1.8,
    ease: "power4.inOut"
  });
});
function updateZoomButtons() {
  // completely zoomed out
  if (zoomLevel === 0) {
    zoomOutBtn.classList.add("active");
    zoomInBtn.classList.remove("active");
  }
  // completely zoomed in
  else if (zoomLevel === 2) {
    zoomInBtn.classList.add("active");
    zoomOutBtn.classList.remove("active");
  }
  // middle level
  else {
    zoomInBtn.classList.remove("active");
    zoomOutBtn.classList.remove("active");
  }
}
  // =========================
  // ZOOM IN
  // =========================
zoomInBtn.addEventListener("click", (e) => {
  e.preventDefault();
  if (zoomLevel === 2) return; // max level
  zoomLevel++;
  updateZoomButtons();
  dragLayer.style.pointerEvents = "auto";
  images.forEach((img) => {
    const rect = img.getBoundingClientRect();
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;
    const distX = (rect.left + rect.width / 2 - centerX) / 100;
    const distY = (rect.top + rect.height / 2 - centerY) / 100;
    // LEVEL 1
if (zoomLevel === 1) {
  const strength = getSpreadStrength();
  gsap.to(img, {
    x: distX * strength,
    y: distY * strength,
        scale: 5,
        duration: 1.8,
        ease: "power4.inOut"
      });
    }
    // LEVEL 2
if (zoomLevel === 2) {
  const baseX = gsap.getProperty(img, "x");
  const baseY = gsap.getProperty(img, "y");
  gsap.to(img, {
x: baseX * 2.4,
y: baseY * 2.4,
    scale: 14,
    duration: 1.8,
    ease: "power4.inOut"
  });
}
  });
});
  // =========================
  // DRAG SYSTEM
  // =========================
  let isDragging = false;
  let startX = 0;
  let startY = 0;
  let initialX = 0;
  let initialY = 0;
  let targetX = 0;
  let targetY = 0;
  let currentX = 0;
  let currentY = 0;
  function lerp(start, end, factor) {
    return start + (end - start) * factor;
  }
  function animate() {
    currentX = lerp(currentX, targetX, 0.08);
    currentY = lerp(currentY, targetY, 0.08);
 gsap.set(gallery, {
  x: currentX,
  y: currentY
});
    requestAnimationFrame(animate);
  }
  animate();
  function handleDragStart(e) {
  if (zoomLevel === 0) return;
    isDragging = true;
    startX = e.type === "mousedown" ? e.pageX : e.touches[0].pageX;
    startY = e.type === "mousedown" ? e.pageY : e.touches[0].pageY;
    const matrix = new DOMMatrix(
      window.getComputedStyle(gallery).transform
    );
    initialX = matrix.m41;
    initialY = matrix.m42;
    targetX = initialX;
    targetY = initialY;
    document.addEventListener("mousemove", handleDragMove, { passive: false });
    document.addEventListener("mouseup", handleDragEnd);
    document.addEventListener("touchmove", handleDragMove, { passive: false });
    document.addEventListener("touchend", handleDragEnd);
  }
  function handleDragMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    const x = e.type === "mousemove" ? e.pageX : e.touches[0].pageX;
    const y = e.type === "mousemove" ? e.pageY : e.touches[0].pageY;
    targetX = initialX + (x - startX);
    targetY = initialY + (y - startY);
  }
  function handleDragEnd() {
    isDragging = false;
    document.removeEventListener("mousemove", handleDragMove);
    document.removeEventListener("mouseup", handleDragEnd);
    document.removeEventListener("touchmove", handleDragMove);
    document.removeEventListener("touchend", handleDragEnd);
  }
  dragLayer.addEventListener("mousedown", handleDragStart);
  dragLayer.addEventListener("touchstart", handleDragStart);
  updateZoomButtons();
});
